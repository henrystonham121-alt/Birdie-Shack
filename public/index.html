<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grindhouse — Golf Society Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --fairway:#1B4332;
    --fairway-deep:#122B21;
    --turf:#40916C;
    --turf-light:#74C69D;
    --cream:#F6F1E4;
    --paper:#FCFAF3;
    --sand:#C9A876;
    --sand-line:#D9C6A0;
    --flag:#A8412F;
    --ink:#26261F;
    --ink-soft:#5C5A4E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:960px;margin:0 auto;padding:0 0 64px;}

  /* HEADER */
  header.hero{
    background:linear-gradient(160deg,var(--fairway) 0%,var(--fairway-deep) 100%);
    color:var(--paper);
    padding:36px 24px 28px;
    border-bottom:6px solid var(--sand);
    position:relative;
    overflow:hidden;
  }
  header.hero::after{
    content:"";
    position:absolute;right:-40px;top:-40px;width:200px;height:200px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06), transparent 70%);
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--turf-light);margin:0 0 8px;
  }
  h1.title{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:clamp(32px,7vw,52px);
    line-height:.95;
    margin:0 0 6px;
    letter-spacing:-.01em;
  }
  .subtitle{
    font-size:14px;color:rgba(246,241,228,.72);max-width:520px;line-height:1.5;
  }

  /* NAV */
  nav.tabs{
    display:flex;gap:2px;overflow-x:auto;
    background:var(--fairway-deep);
    padding:0 24px;
    -ms-overflow-style:none;scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{
    flex:0 0 auto;
    background:none;border:none;
    color:rgba(246,241,228,.55);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    padding:14px 16px;cursor:pointer;
    border-bottom:3px solid transparent;
    transition:color .15s, border-color .15s;
    white-space:nowrap;
  }
  nav.tabs button:hover{color:rgba(246,241,228,.85);}
  nav.tabs button.active{color:var(--paper);border-bottom-color:var(--sand);}

  main{padding:28px 24px 0;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .section-head h2{
    font-family:'Fraunces',serif;font-weight:700;font-size:24px;margin:0;
  }
  .section-note{font-size:12.5px;color:var(--ink-soft);max-width:480px;}

  .card{
    background:var(--paper);
    border:1px solid var(--sand-line);
    border-radius:10px;
    padding:18px 20px;
    margin-bottom:16px;
  }
  .btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;letter-spacing:.04em;text-transform:uppercase;
    background:var(--fairway);color:var(--paper);
    border:none;border-radius:6px;
    padding:10px 16px;cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--fairway-deep);}
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:transparent;color:var(--fairway);border:1.5px solid var(--fairway);}
  .btn.ghost:hover{background:var(--fairway);color:var(--paper);}
  .btn.flag{background:var(--flag);}
  .btn.flag:hover{background:#832F21;}
  .btn.small{padding:6px 10px;font-size:11px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  label{display:block;font-size:11px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:4px;}
  input,select,textarea{
    width:100%;padding:9px 10px;border:1.5px solid var(--sand-line);border-radius:6px;
    background:var(--cream);font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);
    margin-bottom:12px;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--turf);outline-offset:1px;border-color:var(--turf);}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0 14px;}
  textarea{min-height:120px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;resize:vertical;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{
    text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--ink-soft);border-bottom:2px solid var(--sand);padding:8px 8px;
  }
  td{padding:10px 8px;border-bottom:1px solid var(--sand-line);}
  tr:last-child td{border-bottom:none;}
  .rank{font-family:'Fraunces',serif;font-weight:700;font-size:16px;color:var(--fairway);}
  .rank-1{color:var(--flag);}
  .name-cell{font-weight:600;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .pill{
    display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
    padding:2px 7px;border-radius:20px;background:var(--turf);color:var(--paper);
  }
  .pill.over{background:var(--flag);}
  .pill.under{background:var(--fairway);}
  .empty{
    text-align:center;padding:36px 20px;color:var(--ink-soft);font-size:13.5px;
    border:1.5px dashed var(--sand-line);border-radius:10px;
  }
  .empty strong{display:block;font-family:'Fraunces',serif;font-size:18px;color:var(--ink);margin-bottom:4px;font-weight:600;}
  .row-actions{display:flex;gap:6px;}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:6px;}
  .inline-form > div{flex:1;min-width:120px;}
  .banner{
    background:rgba(64,145,108,.12);border:1px solid var(--turf);border-radius:8px;
    padding:10px 14px;font-size:12.5px;color:var(--fairway-deep);margin-bottom:14px;
  }
  .warn{background:rgba(168,65,47,.1);border-color:var(--flag);color:#7A2E1F;}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:8px;
    font-size:13px;font-family:'IBM Plex Mono',monospace;opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:50;
  }
  .toast.show{opacity:1;}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .badge{
    font-size:11px;background:var(--sand);color:var(--fairway-deep);padding:3px 9px;border-radius:20px;
    font-family:'IBM Plex Mono',monospace;
  }
  .legend{font-size:11.5px;color:var(--ink-soft);margin-top:10px;line-height:1.6;}
  .loading{padding:60px 24px;text-align:center;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:13px;}
  @media(max-width:520px){
    table{font-size:12px;}
    th,td{padding:8px 5px;}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading">Loading the clubhouse ledger…</div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){

  const KEYS = { players:'golf:players', courses:'golf:courses', rounds:'golf:rounds', matches:'golf:matches' };
  let STATE = { players:[], courses:[], rounds:[], matches:[], loaded:false };
  let ACTIVE_TAB = 'leaderboard';

  const TABS = [
    {id:'leaderboard', label:'Leaderboard'},
    {id:'rounds', label:'Rounds'},
    {id:'h2h', label:'Head-to-Head'},
    {id:'courses', label:'Courses'},
    {id:'players', label:'Players'},
    {id:'import', label:'Import'},
  ];

  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }

  async function safeGet(key){
    try{
      const resp = await fetch(`/api/data?key=${encodeURIComponent(key)}`);
      if(!resp.ok) return [];
      const data = await resp.json();
      if(!data || data.value===null || data.value===undefined) return [];
      return JSON.parse(data.value);
    }catch(e){ return []; }
  }
  async function safeSet(key, arr){
    try{
      const resp = await fetch('/api/data', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({key, value: JSON.stringify(arr)})
      });
      if(!resp.ok){ showToast('Save failed — try again'); return false; }
      const data = await resp.json();
      if(!data || !data.ok){ showToast('Save failed — try again'); return false; }
      return true;
    }catch(e){ showToast('Save error: '+e.message); return false; }
  }

  async function loadAll(){
    const [players, courses, rounds, matches] = await Promise.all([
      safeGet(KEYS.players), safeGet(KEYS.courses), safeGet(KEYS.rounds), safeGet(KEYS.matches)
    ]);
    STATE = {players, courses, rounds, matches, loaded:true};
    render();
  }

  // ---------- AI HELPERS (scorecard photo reading + course lookup) ----------
  async function callClaudeAPI(payload){
    try{
      const resp = await fetch("/api/claude-proxy", {
        method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)
      });
      const data = await resp.json();
      return data;
    }catch(e){ return {error: e.message}; }
  }
  function extractText(data){
    if(!data || !data.content) return '';
    return data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
  }
  function extractJSON(text){
    if(!text) return null;
    let cleaned = text.replace(/```json/gi,'').replace(/```/g,'').trim();
    const match = cleaned.match(/[\{\[][\s\S]*[\}\]]/);
    if(match) cleaned = match[0];
    try{ return JSON.parse(cleaned); }catch(e){ return null; }
  }
  function fileToBase64(file){
    return new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=> res(r.result.split(',')[1]);
      r.onerror = ()=> rej(new Error('Could not read file'));
      r.readAsDataURL(file);
    });
  }

  // ---------- HANDICAP MATH (simplified WHS) ----------
  const REVEAL_TABLE = [
    null,
    {n:1,use:1,adj:-2},{n:2,use:1,adj:-1},{n:3,use:1,adj:0},{n:4,use:2,adj:-1},
    {n:5,use:1,adj:0},{n:6,use:2,adj:-1},{n:7,use:2,adj:0},{n:8,use:2,adj:0},
    {n:9,use:3,adj:0},{n:10,use:3,adj:0},{n:11,use:3,adj:0},{n:12,use:4,adj:0},
    {n:13,use:4,adj:0},{n:14,use:4,adj:0},{n:15,use:5,adj:0},{n:16,use:5,adj:0},
    {n:17,use:6,adj:0},{n:18,use:6,adj:0},{n:19,use:7,adj:0}
  ];
  function diffFor(n){
    if(n===0) return {use:8,adj:0};
    if(n>=20) return {use:8,adj:0};
    return REVEAL_TABLE[n] || {use:8,adj:0};
  }
  function computeDifferential(gross, rating, slope){
    return Math.round(((113/(slope||113))*(gross-rating))*10)/10;
  }
  function computeHandicapIndex(playerId){
    const rs = STATE.rounds.filter(r=>r.playerId===playerId)
      .sort((a,b)=> new Date(b.date)-new Date(a.date))
      .slice(0,20);
    if(rs.length===0) return null;
    const diffs = rs.map(r=>r.differential).sort((a,b)=>a-b);
    const cfg = diffFor(diffs.length);
    const use = Math.min(cfg.use, diffs.length);
    const best = diffs.slice(0,use);
    const avg = best.reduce((a,b)=>a+b,0)/best.length;
    const idx = Math.round((avg*0.96 + cfg.adj)*10)/10;
    return idx;
  }

  function playerName(id){ const p = STATE.players.find(p=>p.id===id); return p?p.name:'—'; }
  function courseName(id){ const c = STATE.courses.find(c=>c.id===id); return c?c.name:'—'; }
  function courseById(id){ return STATE.courses.find(c=>c.id===id); }

  // ---------- LEADERBOARD ----------
  function buildLeaderboard(){
    return STATE.players.map(p=>{
      const rounds = STATE.rounds.filter(r=>r.playerId===p.id);
      const idx = computeHandicapIndex(p.id);
      const matches = STATE.matches.filter(m=>m.players.includes(p.id));
      const wins = matches.filter(m=>m.winnerId===p.id).length;
      const losses = matches.filter(m=>m.winnerId && m.winnerId!==p.id).length;
      let bestNet = null;
      if(rounds.length && idx!==null){
        bestNet = Math.min(...rounds.map(r=>Math.round(r.gross - idx)));
      }
      const points = wins*3 + rounds.length*1;
      return {player:p, roundsPlayed:rounds.length, idx, wins, losses, bestNet, points};
    }).sort((a,b)=> b.points-a.points || (a.idx===null?999:a.idx)-(b.idx===null?999:b.idx));
  }

  // ---------- RENDER ----------
  function render(){
    const app = document.getElementById('app');
    app.innerHTML = `
      <header class="hero">
        <p class="eyebrow">Est. this season · a golf society ledger</p>
        <h1 class="title">The Grindhouse</h1>
        <p class="subtitle">Handicaps, head-to-heads, and who owes who a beer — tracked properly, for the whole crew.</p>
      </header>
      <nav class="tabs">
        ${TABS.map(t=>`<button data-tab="${t.id}" class="${ACTIVE_TAB===t.id?'active':''}">${t.label}</button>`).join('')}
      </nav>
      <main id="main"></main>
    `;
    app.querySelectorAll('nav.tabs button').forEach(btn=>{
      btn.addEventListener('click', ()=>{ ACTIVE_TAB = btn.dataset.tab; render(); });
    });
    const main = document.getElementById('main');
    if(ACTIVE_TAB==='leaderboard') main.innerHTML = renderLeaderboard();
    if(ACTIVE_TAB==='rounds') main.innerHTML = renderRounds();
    if(ACTIVE_TAB==='h2h') main.innerHTML = renderH2H();
    if(ACTIVE_TAB==='courses') main.innerHTML = renderCourses();
    if(ACTIVE_TAB==='players') main.innerHTML = renderPlayers();
    if(ACTIVE_TAB==='import') main.innerHTML = renderImport();
    bindTabEvents();
  }

  function renderLeaderboard(){
    const rows = buildLeaderboard();
    if(STATE.players.length===0){
      return `<div class="empty"><strong>No golfers yet</strong>Add your crew in the Players tab to start the ledger.</div>`;
    }
    return `
      <div class="section-head">
        <h2>Season Leaderboard</h2>
        <span class="section-note">Points = 3 per head-to-head win + 1 per round logged. Net uses each player's current handicap index.</span>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>#</th><th>Player</th><th>HCP Index</th><th>Rounds</th><th>Best Net</th><th>Record</th><th>Points</th></tr></thead>
          <tbody>
            ${rows.map((r,i)=>`
              <tr>
                <td class="rank ${i===0?'rank-1':''}">${i+1}</td>
                <td class="name-cell">${r.player.name}${i===0 && r.points>0 ? ' <span class="pill">Top of the ledger</span>':''}</td>
                <td class="mono">${r.idx===null?'NH':r.idx.toFixed(1)}</td>
                <td class="mono">${r.roundsPlayed}</td>
                <td class="mono">${r.bestNet===null?'—':r.bestNet}</td>
                <td class="mono">${r.wins}-${r.losses}</td>
                <td class="mono">${r.points}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <p class="legend">NH = not enough rounds yet for a handicap index (need at least 1, more rounds sharpens accuracy). Handicap uses a simplified World Handicap System calculation from logged rounds.</p>
      </div>
    `;
  }

  function renderRounds(){
    const playerOpts = STATE.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    const courseOpts = STATE.courses.map(c=>`<option value="${c.id}">${c.name} (par ${c.par})</option>`).join('');
    const disabled = (STATE.players.length===0 || STATE.courses.length===0);
    const rounds = [...STATE.rounds].sort((a,b)=> new Date(b.date)-new Date(a.date));
    return `
      <div class="section-head">
        <h2>Log a Round</h2>
        <span class="section-note">Add players and courses first if the dropdowns are empty.</span>
      </div>
      <div class="card">
        <form id="round-form">
          <div class="form-grid">
            <div><label>Player</label><select name="playerId" required ${disabled?'disabled':''}>${playerOpts||'<option value="">Add a player first</option>'}</select></div>
            <div><label>Course</label><select name="courseId" required ${disabled?'disabled':''}>${courseOpts||'<option value="">Add a course first</option>'}</select></div>
            <div><label>Date</label><input type="date" name="date" value="${new Date().toISOString().slice(0,10)}" required></div>
            <div><label>Gross score</label><input type="number" name="gross" min="50" max="150" placeholder="e.g. 88" required></div>
          </div>
          <button class="btn" type="submit" ${disabled?'disabled':''}>Log round</button>
        </form>
      </div>
      <div class="section-head" style="margin-top:22px;"><h2>Recent Rounds</h2></div>
      ${rounds.length===0 ? `<div class="empty"><strong>No rounds logged</strong>Log one above, or bring in history via the Import tab.</div>` : `
      <div class="card">
        <table>
          <thead><tr><th>Date</th><th>Player</th><th>Course</th><th>Gross</th><th>Diff.</th><th></th></tr></thead>
          <tbody>
            ${rounds.map(r=>{
              const c = courseById(r.courseId);
              const toPar = c ? r.gross - c.par : null;
              return `<tr>
                <td class="mono">${r.date}</td>
                <td>${playerName(r.playerId)}</td>
                <td>${r.courseName || courseName(r.courseId)}</td>
                <td class="mono">${r.gross}${toPar!==null?` <span class="pill ${toPar>0?'over':(toPar<0?'under':'')}">${toPar>0?'+':''}${toPar}</span>`:''}</td>
                <td class="mono">${r.differential}</td>
                <td><button class="btn ghost small" data-delround="${r.id}">Remove</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}
    `;
  }

  function renderH2H(){
    const playerOpts = STATE.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    const disabled = STATE.players.length < 2;
    const matches = [...STATE.matches].sort((a,b)=> new Date(b.date)-new Date(a.date));
    return `
      <div class="section-head">
        <h2>Log a Match</h2>
        <span class="section-note">Bragging rights, side bets, or a proper match-play card — log the result here.</span>
      </div>
      <div class="card">
        <form id="match-form">
          <div class="form-grid">
            <div><label>Player A</label><select name="a" required ${disabled?'disabled':''}>${playerOpts}</select></div>
            <div><label>Player B</label><select name="b" required ${disabled?'disabled':''}>${playerOpts}</select></div>
            <div><label>Format</label><select name="format"><option>Stroke play</option><option>Match play</option><option>Skins</option><option>Nassau</option></select></div>
            <div><label>Date</label><input type="date" name="date" value="${new Date().toISOString().slice(0,10)}" required></div>
          </div>
          <label>Winner</label>
          <select name="winnerId" ${disabled?'disabled':''}>${playerOpts}<option value="">Halved / no winner</option></select>
          <label>Stakes (optional)</label>
          <input type="text" name="stakes" placeholder="e.g. Loser buys the first round">
          <button class="btn flag" type="submit" ${disabled?'disabled':''}>Log match</button>
        </form>
        ${disabled?'<div class="banner warn">Add at least 2 players first.</div>':''}
      </div>
      <div class="section-head" style="margin-top:22px;"><h2>Match Log</h2></div>
      ${matches.length===0? `<div class="empty"><strong>No matches yet</strong>Log your first head-to-head above.</div>` : `
      <div class="card"><table>
        <thead><tr><th>Date</th><th>Matchup</th><th>Format</th><th>Winner</th><th>Stakes</th><th></th></tr></thead>
        <tbody>
        ${matches.map(m=>`
          <tr>
            <td class="mono">${m.date}</td>
            <td>${playerName(m.players[0])} vs ${playerName(m.players[1])}</td>
            <td>${m.format}</td>
            <td class="name-cell">${m.winnerId? playerName(m.winnerId) : 'Halved'}</td>
            <td>${m.stakes||'—'}</td>
            <td><button class="btn ghost small" data-delmatch="${m.id}">Remove</button></td>
          </tr>
        `).join('')}
        </tbody>
      </table></div>`}
    `;
  }

  function renderCourses(){
    const courses = STATE.courses;
    return `
      <div class="section-head">
        <h2>Add a Course</h2>
        <span class="section-note">Rating and slope come from the course's scorecard — needed for accurate handicap math.</span>
      </div>
      <div class="card">
        <form id="course-form">
          <div class="form-grid">
            <div><label>Course name</label><input type="text" name="name" placeholder="e.g. Alpine Golf Club" required></div>
            <div><label>Par</label><input type="number" name="par" value="72" required></div>
            <div><label>Course rating</label><input type="number" step="0.1" name="rating" placeholder="e.g. 71.5" required></div>
            <div><label>Slope</label><input type="number" name="slope" placeholder="e.g. 128" value="113" required></div>
          </div>
          <button class="btn" type="submit">Add course</button>
        </form>
      </div>
      <div class="section-head" style="margin-top:22px;"><h2>Look Up Course Details</h2></div>
      <div class="banner">Type one course name per line — Claude will search for the par, rating, and slope for each and hand back an editable preview before anything's added.</div>
      <div class="card">
        <textarea id="course-lookup-input" placeholder="Alpine Golf Club&#10;Riverside Country Club"></textarea>
        <button class="btn" id="course-lookup-btn">Look up courses</button>
        <div id="course-lookup-status"></div>
        <div id="course-lookup-preview"></div>
      </div>
      ${courses.length===0? `<div class="empty"><strong>No courses yet</strong>Add the courses your group plays.</div>` : `
      <div class="card"><table>
        <thead><tr><th>Course</th><th>Par</th><th>Rating</th><th>Slope</th><th></th></tr></thead>
        <tbody>${courses.map(c=>`
          <tr><td class="name-cell">${c.name}</td><td class="mono">${c.par}</td><td class="mono">${c.rating}</td><td class="mono">${c.slope}</td>
          <td><button class="btn ghost small" data-delcourse="${c.id}">Remove</button></td></tr>
        `).join('')}</tbody>
      </table></div>`}
    `;
  }

  function renderCourseLookupPreview(results){
    const box = document.getElementById('course-lookup-preview');
    box.innerHTML = `
      <table>
        <thead><tr><th>Course</th><th>Tee</th><th>Par</th><th>Rating</th><th>Slope</th><th>Confidence</th></tr></thead>
        <tbody>
          ${results.map(r=>`
            <tr>
              <td><input type="text" class="cl-name" value="${(r.name||'').replace(/"/g,'&quot;')}" style="margin-bottom:0;"></td>
              <td><input type="text" class="cl-tee" value="${(r.tee||'').replace(/"/g,'&quot;')}" style="margin-bottom:0;"></td>
              <td><input type="number" class="cl-par" value="${r.par||72}" style="margin-bottom:0;width:70px;"></td>
              <td><input type="number" step="0.1" class="cl-rating" value="${r.rating||''}" style="margin-bottom:0;width:80px;"></td>
              <td><input type="number" class="cl-slope" value="${r.slope||''}" style="margin-bottom:0;width:80px;"></td>
              <td class="mono">${r.confidence||(r.error?'error':'—')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <p class="legend">Confidence reflects how sure Claude was based on what it found searching — check any "low" or blank rows against the course's own scorecard before trusting the handicap math.</p>
      <button class="btn" id="cl-confirm" style="margin-top:12px;">Add these courses</button>
    `;
    document.getElementById('cl-confirm').addEventListener('click', async ()=>{
      const rows = box.querySelectorAll('tbody tr');
      let count = 0;
      rows.forEach(row=>{
        const name = row.querySelector('.cl-name').value.trim();
        if(!name) return;
        const par = parseFloat(row.querySelector('.cl-par').value)||72;
        const ratingVal = row.querySelector('.cl-rating').value;
        const slopeVal = row.querySelector('.cl-slope').value;
        const rating = ratingVal ? parseFloat(ratingVal) : par;
        const slope = slopeVal ? parseFloat(slopeVal) : 113;
        const existing = STATE.courses.find(c=>c.name.toLowerCase()===name.toLowerCase());
        if(existing){ existing.par=par; existing.rating=rating; existing.slope=slope; }
        else{ STATE.courses.push({id:uid(), name, par, rating, slope}); }
        count++;
      });
      await safeSet(KEYS.courses, STATE.courses);
      showToast(`Added/updated ${count} course${count===1?'':'s'}`);
      ACTIVE_TAB = 'courses';
      render();
    });
  }

  function renderPlayers(){
    const players = STATE.players;
    return `
      <div class="section-head"><h2>The Roster</h2></div>
      <div class="card">
        <form id="player-form" class="inline-form">
          <div><label>Name</label><input type="text" name="name" placeholder="e.g. Nikesh" required></div>
          <button class="btn" type="submit">Add golfer</button>
        </form>
      </div>
      ${players.length===0? `<div class="empty"><strong>No golfers yet</strong>Add your crew above.</div>` : `
      <div class="card"><table>
        <thead><tr><th>Name</th><th>HCP Index</th><th>Rounds</th><th></th></tr></thead>
        <tbody>${players.map(p=>{
          const idx = computeHandicapIndex(p.id);
          const n = STATE.rounds.filter(r=>r.playerId===p.id).length;
          return `<tr><td class="name-cell">${p.name}</td><td class="mono">${idx===null?'NH':idx.toFixed(1)}</td><td class="mono">${n}</td>
          <td><button class="btn ghost small" data-delplayer="${p.id}">Remove</button></td></tr>`;
        }).join('')}</tbody>
      </table></div>`}
    `;
  }

  function renderImport(){
    const playerOpts = STATE.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    const disabled = STATE.players.length===0;
    return `
      <div class="section-head"><h2>Import from TheGrint</h2></div>
      <div class="banner">TheGrint doesn't offer a personal data export or public API — the closest thing is their own copy/paste import tool, which expects <strong>Date, Course, Tees, Score</strong> per row. Paste that same layout below and it'll drop straight into this player's rounds. Add optional Rating/Slope/Par columns if you're logging a course for the first time — otherwise it defaults to par 72 / rating 72.0 / slope 113, which will slightly skew handicap accuracy until you correct it.</div>
      <div class="card">
        <form id="import-form">
          <label>Which player is this scoring history for?</label>
          <select name="playerId" ${disabled?'disabled':''}>${playerOpts||'<option value="">Add a player first</option>'}</select>
          <label>Paste rows — tab or comma separated: Date, Course, Tees, Score, [Rating, Slope, Par]</label>
          <textarea name="raw" placeholder="2026-06-01, Alpine Golf Club, White, 89, 71.5, 128, 72
2026-06-15, Alpine Golf Club, White, 85"></textarea>
          <button class="btn" type="submit" ${disabled?'disabled':''}>Preview import</button>
        </form>
        <div id="import-preview"></div>
      </div>
      <div class="section-head" style="margin-top:22px;"><h2>Import from a Scorecard Photo</h2></div>
      <div class="banner">Snap or upload a photo of a scorecard — a TheGrint screenshot or a paper card both work. Claude reads the course, tee, date, and every player's score off the card, then hands you an editable preview before anything's saved.</div>
      <div class="card">
        <label>Photo</label>
        <input type="file" accept="image/*" id="scorecard-photo">
        <button class="btn" id="extract-scorecard-btn" disabled>Extract scores</button>
        <div id="scorecard-status"></div>
        <div id="scorecard-preview"></div>
      </div>
    `;
  }

  function renderScorecardPreview(parsed){
    const box = document.getElementById('scorecard-preview');
    const players = (parsed.players && parsed.players.length) ? parsed.players : [{name:null, totalScore:null}];
    const needsAttention = (parsed.rating===null || parsed.rating===undefined || parsed.slope===null || parsed.slope===undefined);
    box.innerHTML = `
      <div class="card" style="margin-top:12px;">
        <div class="form-grid">
          <div><label>Course</label><input type="text" id="sc-course" value="${parsed.courseName||''}"></div>
          <div><label>Tee</label><input type="text" id="sc-tee" value="${parsed.teeName||''}"></div>
          <div><label>Date</label><input type="date" id="sc-date" value="${parsed.date||new Date().toISOString().slice(0,10)}"></div>
          <div><label>Par</label><input type="number" id="sc-par" value="${parsed.par||72}"></div>
          <div><label>Rating</label><input type="number" step="0.1" id="sc-rating" value="${parsed.rating||72.0}"></div>
          <div><label>Slope</label><input type="number" id="sc-slope" value="${parsed.slope||113}"></div>
        </div>
        <p class="section-note" style="margin-bottom:10px;">${needsAttention ? "Rating/slope weren't legible on the card — defaults are filled in, correct them for accurate handicaps." : "Double-check these against the card before saving."}</p>
        <table>
          <thead><tr><th>Detected name</th><th>Score</th><th>Assign to</th></tr></thead>
          <tbody>
            ${players.map(p=>`
              <tr>
                <td><input type="text" class="sc-pname" value="${p.name||''}" style="margin-bottom:0;"></td>
                <td><input type="number" class="sc-pscore" value="${p.totalScore||''}" style="margin-bottom:0;width:80px;"></td>
                <td>
                  <select class="sc-passign" style="margin-bottom:0;">
                    <option value="">— New player —</option>
                    ${STATE.players.map(rp=>`<option value="${rp.id}" ${(rp.name && p.name && rp.name.toLowerCase()===p.name.toLowerCase())?'selected':''}>${rp.name}</option>`).join('')}
                  </select>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <button class="btn" id="sc-confirm" style="margin-top:12px;">Save these rounds</button>
      </div>
    `;
    document.getElementById('sc-confirm').addEventListener('click', async ()=>{
      const courseName = document.getElementById('sc-course').value.trim();
      if(!courseName){ showToast('Course name is required'); return; }
      const date = document.getElementById('sc-date').value;
      const par = parseFloat(document.getElementById('sc-par').value)||72;
      const rating = parseFloat(document.getElementById('sc-rating').value)||72;
      const slope = parseFloat(document.getElementById('sc-slope').value)||113;
      let course = STATE.courses.find(c=>c.name.toLowerCase()===courseName.toLowerCase());
      if(!course){ course = {id:uid(), name:courseName, par, rating, slope}; STATE.courses.push(course); }
      else { course.par=par; course.rating=rating; course.slope=slope; }
      const rows = box.querySelectorAll('tbody tr');
      let count = 0;
      rows.forEach(row=>{
        const name = row.querySelector('.sc-pname').value.trim();
        const scoreVal = row.querySelector('.sc-pscore').value;
        const assign = row.querySelector('.sc-passign').value;
        if(!name || !scoreVal) return;
        let playerId = assign;
        if(!playerId){
          const newP = {id:uid(), name};
          STATE.players.push(newP);
          playerId = newP.id;
        }
        const gross = parseFloat(scoreVal);
        const differential = computeDifferential(gross, course.rating, course.slope);
        STATE.rounds.push({id:uid(), playerId, courseId:course.id, courseName:course.name, date, gross, differential});
        count++;
      });
      await safeSet(KEYS.courses, STATE.courses);
      await safeSet(KEYS.players, STATE.players);
      await safeSet(KEYS.rounds, STATE.rounds);
      showToast(`Saved ${count} round${count===1?'':'s'} from the scorecard`);
      ACTIVE_TAB = 'rounds';
      render();
    });
  }

  // ---------- EVENT BINDING ----------
  function bindTabEvents(){
    const main = document.getElementById('main');

    const roundForm = main.querySelector('#round-form');
    if(roundForm) roundForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(roundForm);
      const courseId = fd.get('courseId');
      const c = courseById(courseId);
      const gross = parseFloat(fd.get('gross'));
      const differential = computeDifferential(gross, c.rating, c.slope);
      STATE.rounds.push({id:uid(), playerId:fd.get('playerId'), courseId, courseName:c.name, date:fd.get('date'), gross, differential});
      await safeSet(KEYS.rounds, STATE.rounds);
      showToast('Round logged');
      render();
    });

    main.querySelectorAll('[data-delround]').forEach(b=> b.addEventListener('click', async ()=>{
      STATE.rounds = STATE.rounds.filter(r=>r.id!==b.dataset.delround);
      await safeSet(KEYS.rounds, STATE.rounds);
      render();
    }));

    const matchForm = main.querySelector('#match-form');
    if(matchForm) matchForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(matchForm);
      const a = fd.get('a'), b = fd.get('b');
      if(a===b){ showToast('Pick two different players'); return; }
      STATE.matches.push({id:uid(), players:[a,b], format:fd.get('format'), date:fd.get('date'), winnerId:fd.get('winnerId')||null, stakes:fd.get('stakes')});
      await safeSet(KEYS.matches, STATE.matches);
      showToast('Match logged');
      render();
    });

    main.querySelectorAll('[data-delmatch]').forEach(b=> b.addEventListener('click', async ()=>{
      STATE.matches = STATE.matches.filter(m=>m.id!==b.dataset.delmatch);
      await safeSet(KEYS.matches, STATE.matches);
      render();
    }));

    const courseForm = main.querySelector('#course-form');
    if(courseForm) courseForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(courseForm);
      STATE.courses.push({id:uid(), name:fd.get('name'), par:parseFloat(fd.get('par')), rating:parseFloat(fd.get('rating')), slope:parseFloat(fd.get('slope'))});
      await safeSet(KEYS.courses, STATE.courses);
      showToast('Course added');
      render();
    });

    main.querySelectorAll('[data-delcourse]').forEach(b=> b.addEventListener('click', async ()=>{
      STATE.courses = STATE.courses.filter(c=>c.id!==b.dataset.delcourse);
      await safeSet(KEYS.courses, STATE.courses);
      render();
    }));

    const playerForm = main.querySelector('#player-form');
    if(playerForm) playerForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(playerForm);
      const name = fd.get('name').trim();
      if(!name) return;
      STATE.players.push({id:uid(), name});
      await safeSet(KEYS.players, STATE.players);
      showToast('Golfer added');
      render();
    });

    main.querySelectorAll('[data-delplayer]').forEach(b=> b.addEventListener('click', async ()=>{
      STATE.players = STATE.players.filter(p=>p.id!==b.dataset.delplayer);
      await safeSet(KEYS.players, STATE.players);
      render();
    }));

    const importForm = main.querySelector('#import-form');
    if(importForm) importForm.addEventListener('submit', e=>{
      e.preventDefault();
      const fd = new FormData(importForm);
      const playerId = fd.get('playerId');
      const raw = fd.get('raw').trim();
      if(!raw || !playerId){ showToast('Pick a player and paste some rows'); return; }
      const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
      const parsed = lines.map(line=>{
        const delim = line.includes('\t') ? '\t' : ',';
        const cols = line.split(delim).map(s=>s.trim());
        const [date, course, tees, score, rating, slope, par] = cols;
        return {
          date: date, course: course, tees: tees||'', score: parseFloat(score),
          rating: rating?parseFloat(rating):72.0, slope: slope?parseFloat(slope):113, par: par?parseFloat(par):72
        };
      }).filter(r=> r.course && !isNaN(r.score));

      const preview = document.getElementById('import-preview');
      if(parsed.length===0){
        preview.innerHTML = `<div class="banner warn">Couldn't parse any rows — check the format and try again.</div>`;
        return;
      }
      preview.innerHTML = `
        <div class="banner">Found ${parsed.length} round${parsed.length===1?'':'s'} for ${playerName(playerId)}. Review, then confirm.</div>
        <table><thead><tr><th>Date</th><th>Course</th><th>Tees</th><th>Score</th><th>Rating</th><th>Slope</th></tr></thead>
        <tbody>${parsed.map(p=>`<tr><td class="mono">${p.date}</td><td>${p.course}</td><td>${p.tees}</td><td class="mono">${p.score}</td><td class="mono">${p.rating}</td><td class="mono">${p.slope}</td></tr>`).join('')}</tbody></table>
        <button class="btn" id="confirm-import" style="margin-top:12px;">Confirm import</button>
      `;
      document.getElementById('confirm-import').addEventListener('click', async ()=>{
        for(const row of parsed){
          let c = STATE.courses.find(c=>c.name.toLowerCase()===row.course.toLowerCase());
          if(!c){
            c = {id:uid(), name:row.course, par:row.par, rating:row.rating, slope:row.slope};
            STATE.courses.push(c);
          }
          const differential = computeDifferential(row.score, c.rating, c.slope);
          STATE.rounds.push({id:uid(), playerId, courseId:c.id, courseName:c.name, date:row.date, gross:row.score, differential});
        }
        await safeSet(KEYS.courses, STATE.courses);
        await safeSet(KEYS.rounds, STATE.rounds);
        showToast(`Imported ${parsed.length} rounds`);
        ACTIVE_TAB = 'rounds';
        render();
      });
    });

    // Scorecard photo extraction
    const photoInput = main.querySelector('#scorecard-photo');
    const extractBtn = main.querySelector('#extract-scorecard-btn');
    if(photoInput){
      photoInput.addEventListener('change', ()=>{ extractBtn.disabled = !photoInput.files.length; });
    }
    if(extractBtn) extractBtn.addEventListener('click', async ()=>{
      const file = photoInput.files[0];
      if(!file) return;
      const statusEl = main.querySelector('#scorecard-status');
      extractBtn.disabled = true;
      statusEl.innerHTML = `<p class="section-note">Reading the scorecard…</p>`;
      try{
        const mediaType = file.type || 'image/jpeg';
        const base64 = await fileToBase64(file);
        const prompt = `You are reading a photo of a golf scorecard (could be a paper card or a screenshot from an app like TheGrint). Extract what's visible and respond with ONLY valid JSON, no markdown fences, no commentary, in exactly this shape:
{
  "courseName": string or null,
  "teeName": string or null,
  "date": string in YYYY-MM-DD format or null,
  "par": number or null,
  "rating": number or null,
  "slope": number or null,
  "players": [ { "name": string or null, "totalScore": number or null } ]
}
If a total score isn't printed but hole-by-hole scores are visible, sum them yourself. List every player column on the card. Use null for anything genuinely not visible or legible — do not guess.`;
        const data = await callClaudeAPI({
          model:"claude-sonnet-4-6", max_tokens:1000,
          messages:[{role:"user", content:[
            {type:"image", source:{type:"base64", media_type:mediaType, data:base64}},
            {type:"text", text:prompt}
          ]}]
        });
        if(data.error){ statusEl.innerHTML = `<div class="banner warn">Couldn't read the photo: ${data.error}</div>`; extractBtn.disabled=false; return; }
        const parsed = extractJSON(extractText(data));
        if(!parsed){ statusEl.innerHTML = `<div class="banner warn">Couldn't make out a scorecard in that photo — try a clearer or straighter shot.</div>`; extractBtn.disabled=false; return; }
        statusEl.innerHTML = '';
        extractBtn.disabled = false;
        renderScorecardPreview(parsed);
      }catch(e){
        statusEl.innerHTML = `<div class="banner warn">Something went wrong reading that photo: ${e.message}</div>`;
        extractBtn.disabled = false;
      }
    });

    // Course auto-lookup
    const lookupBtn = main.querySelector('#course-lookup-btn');
    if(lookupBtn) lookupBtn.addEventListener('click', async ()=>{
      const input = main.querySelector('#course-lookup-input');
      const names = input.value.split('\n').map(s=>s.trim()).filter(Boolean);
      if(!names.length) return;
      const statusEl = main.querySelector('#course-lookup-status');
      const previewEl = main.querySelector('#course-lookup-preview');
      previewEl.innerHTML = '';
      lookupBtn.disabled = true;
      const results = [];
      for(const name of names){
        statusEl.innerHTML = `<p class="section-note">Looking up ${name}…</p>`;
        const prompt = `Find the official golf course rating, slope rating, and par for the golf course named "${name}". Prefer the men's standard/white tees if multiple tees exist. Respond with ONLY valid JSON, no markdown fences, no commentary, in exactly this shape:
{"name": "${name.replace(/"/g,'\\"')}", "tee": string or null, "par": number or null, "rating": number or null, "slope": number or null, "confidence": "high" or "medium" or "low"}
If you can't find reliable data, set par/rating/slope to null and confidence to "low".`;
        const data = await callClaudeAPI({
          model:"claude-sonnet-4-6", max_tokens:1000,
          messages:[{role:"user", content:prompt}],
          tools:[{type:"web_search_20250305", name:"web_search"}]
        });
        if(data.error){ results.push({name, error:data.error}); continue; }
        const parsed = extractJSON(extractText(data));
        results.push(parsed || {name, par:null, rating:null, slope:null, confidence:'low'});
      }
      statusEl.innerHTML = '';
      lookupBtn.disabled = false;
      renderCourseLookupPreview(results);
    });
  }

  loadAll();
})();
</script>
</body>
</html>
