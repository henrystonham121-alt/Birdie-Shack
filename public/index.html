<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Birdie Shack — Golf Society Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --fairway:#1B4332;
    --fairway-deep:#122B21;
    --turf:#40916C;
    --turf-light:#74C69D;
    --cream:#F6F1E4;
    --paper:#FCFAF3;
    --sand:#C9A876;
    --sand-line:#D9C6A0;
    --flag:#A8412F;
    --ink:#26261F;
    --ink-soft:#5C5A4E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:960px;margin:0 auto;padding:0 0 64px;}

  /* HEADER */
  header.hero{
    background:linear-gradient(160deg,var(--fairway) 0%,var(--fairway-deep) 100%);
    color:var(--paper);
    padding:36px 24px 28px;
    border-bottom:6px solid var(--sand);
    position:relative;
    overflow:hidden;
  }
  header.hero::after{
    content:"";
    position:absolute;right:-40px;top:-40px;width:200px;height:200px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06), transparent 70%);
  }
  .team-photo-banner{
    display:block;
    width:100%;
    border-radius:14px;
    margin:18px 0 4px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.15);
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--turf-light);margin:0 0 8px;
  }
  h1.title{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:clamp(32px,7vw,52px);
    line-height:.95;
    margin:0 0 6px;
    letter-spacing:-.01em;
  }
  .subtitle{
    font-size:14px;color:rgba(246,241,228,.72);max-width:520px;line-height:1.5;
  }

  /* NAV */
  nav.tabs{
    display:flex;gap:2px;overflow-x:auto;
    background:var(--fairway-deep);
    padding:0 24px;
    -ms-overflow-style:none;scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{
    flex:0 0 auto;
    background:none;border:none;
    color:rgba(246,241,228,.55);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    padding:14px 16px;cursor:pointer;
    border-bottom:3px solid transparent;
    transition:color .15s, border-color .15s;
    white-space:nowrap;
  }
  nav.tabs button:hover{color:rgba(246,241,228,.85);}
  nav.tabs button.active{color:var(--paper);border-bottom-color:var(--sand);}

  main{padding:28px 24px 0;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .section-head h2{
    font-family:'Fraunces',serif;font-weight:700;font-size:24px;margin:0;
  }
  .section-note{font-size:12.5px;color:var(--ink-soft);max-width:480px;}

  .card{
    background:var(--paper);
    border:1px solid var(--sand-line);
    border-radius:10px;
    padding:18px 20px;
    margin-bottom:16px;
  }
  .btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;letter-spacing:.04em;text-transform:uppercase;
    background:var(--fairway);color:var(--paper);
    border:none;border-radius:6px;
    padding:10px 16px;cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--fairway-deep);}
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:transparent;color:var(--fairway);border:1.5px solid var(--fairway);}
  .btn.ghost:hover{background:var(--fairway);color:var(--paper);}
  .btn.flag{background:var(--flag);}
  .btn.flag:hover{background:#832F21;}
  .btn.small{padding:6px 10px;font-size:11px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  label{display:block;font-size:11px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:4px;}
  input,select,textarea{
    width:100%;padding:9px 10px;border:1.5px solid var(--sand-line);border-radius:6px;
    background:var(--cream);font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);
    margin-bottom:12px;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--turf);outline-offset:1px;border-color:var(--turf);}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0 14px;}
  textarea{min-height:120px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;resize:vertical;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{
    text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--ink-soft);border-bottom:2px solid var(--sand);padding:8px 8px;
  }
  td{padding:10px 8px;border-bottom:1px solid var(--sand-line);}
  tr:last-child td{border-bottom:none;}
  .rank{font-family:'Fraunces',serif;font-weight:700;font-size:16px;color:var(--fairway);}
  .rank-1{color:var(--flag);}
  .name-cell{font-weight:600;}
  .flag-cell{display:inline-block;margin-right:6px;font-size:.95em;letter-spacing:1px;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .pill{
    display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
    padding:2px 7px;border-radius:20px;background:var(--turf);color:var(--paper);
  }
  .pill.over{background:var(--flag);}
  .pill.under{background:var(--fairway);}
  .empty{
    text-align:center;padding:36px 20px;color:var(--ink-soft);font-size:13.5px;
    border:1.5px dashed var(--sand-line);border-radius:10px;
  }
  .empty strong{display:block;font-family:'Fraunces',serif;font-size:18px;color:var(--ink);margin-bottom:4px;font-weight:600;}
  .row-actions{display:flex;gap:6px;}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:6px;}
  .inline-form > div{flex:1;min-width:120px;}
  .banner{
    background:rgba(64,145,108,.12);border:1px solid var(--turf);border-radius:8px;
    padding:10px 14px;font-size:12.5px;color:var(--fairway-deep);margin-bottom:14px;
  }
  .warn{background:rgba(168,65,47,.1);border-color:var(--flag);color:#7A2E1F;}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:8px;
    font-size:13px;font-family:'IBM Plex Mono',monospace;opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:50;
  }
  .toast.show{opacity:1;}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .badge{
    font-size:11px;background:var(--sand);color:var(--fairway-deep);padding:3px 9px;border-radius:20px;
    font-family:'IBM Plex Mono',monospace;
  }
  .legend{font-size:11.5px;color:var(--ink-soft);margin-top:10px;line-height:1.6;}
  .loading{padding:60px 24px;text-align:center;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:13px;}
  .avatar{
    width:26px;height:26px;border-radius:50%;object-fit:cover;
    vertical-align:middle;margin-right:8px;border:1.5px solid var(--sand);
    background:var(--cream);display:inline-block;
  }
  .avatar-lg{width:44px;height:44px;margin-right:12px;border-width:2px;}
  .avatar-fallback{
    display:inline-flex;align-items:center;justify-content:center;
    background:var(--turf);color:var(--paper);font-family:'IBM Plex Mono',monospace;
    font-weight:600;font-size:12px;
  }
  .avatar-lg.avatar-fallback{font-size:18px;}
  .avatar-carc{
    display:inline-flex;vertical-align:middle;margin-right:8px;overflow:hidden;
    border-radius:8px;background:var(--cream);border:1px solid var(--sand-line);
  }
  .avatar-carc.avatar-lg{margin-right:12px;border-radius:10px;}
  .team-photo-wrap{
    background:linear-gradient(160deg,var(--fairway) 0%,var(--fairway-deep) 100%);
    border-radius:12px;padding:22px 16px 16px;margin-bottom:22px;position:relative;overflow:hidden;
  }
  .team-photo-title{
    font-family:'Fraunces',serif;font-weight:800;font-size:19px;color:var(--paper);margin:0 0 4px;
  }
  .team-photo-sub{font-size:12px;color:rgba(246,241,228,.7);margin:0 0 14px;}
  .team-lineup{display:flex;flex-wrap:wrap;gap:10px 6px;justify-content:center;align-items:flex-end;}
  .team-member{display:flex;flex-direction:column;align-items:center;width:78px;}
  .team-member-figure{width:70px;height:94px;}
  .team-member-name{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--paper);margin-top:4px;
    text-align:center;max-width:78px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .header-lineup{display:flex;align-items:center;margin-top:14px;}
  .header-lineup .avatar-carc{
    width:34px;height:30px;margin-right:-10px;border:2px solid var(--fairway-deep);
    border-radius:7px;box-shadow:0 1px 3px rgba(0,0,0,.35);
  }
  .header-lineup-more{
    font-family:'IBM Plex Mono',monospace;font-size:11px;
    background:var(--sand);color:var(--fairway-deep);border-radius:50%;
    width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;
    margin-left:2px;border:2px solid var(--fairway-deep);
  }
  .modal-overlay{
    position:fixed;inset:0;background:rgba(18,43,33,.6);display:flex;align-items:center;justify-content:center;
    padding:20px;z-index:60;
  }
  .modal-box{
    background:var(--paper);border-radius:14px;padding:26px 24px 22px;max-width:380px;width:100%;
    position:relative;box-shadow:0 16px 44px rgba(0,0,0,.35);border:1px solid var(--sand-line);
  }
  .modal-close{
    position:absolute;top:10px;right:12px;background:none;border:none;font-size:24px;line-height:1;
    cursor:pointer;color:var(--ink-soft);padding:4px;
  }
  .modal-close:hover{color:var(--ink);}
  .modal-player-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-right:20px;}
  .modal-player-head .avatar-carc{width:54px;height:46px;margin-right:0;}
  .modal-player-head h2{margin:0;font-family:'Fraunces',serif;font-weight:700;font-size:21px;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 18px;}
  .stat-item{display:flex;flex-direction:column;gap:3px;}
  .stat-item.full{grid-column:1 / -1;}
  .stat-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);}
  .stat-value{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;color:var(--fairway-deep);}
  @media(max-width:520px){
    table{font-size:12px;}
    th,td{padding:8px 5px;}
  }
</style>
</head>

  function avatarUrl(name){
    if(!name) return null;
    const key = Object.keys(AVATARS).find(k=>k.toLowerCase()===String(name).trim().toLowerCase());
    return key ? AVATARS[key] : null;
  }

  // ---------- CARICATURE AVATARS (face + illustrated body) ----------
  // Each player gets a consistent "look" (shirt colour, pose, skin tone)
  // derived from their name, so the same person always renders the same
  // way. If they've uploaded a photo, it's clipped into the head; if not,
  // we fall back to an illustrated head with their initial.
  function hashCode(str){
    let h = 0;
    for(let i=0;i<str.length;i++){ h = (h<<5) - h + str.charCodeAt(i); h |= 0; }
    return Math.abs(h);
  }

    jan: ['🇩🇪'],
    lloyd: ['🏴󠁧󠁢󠁥󠁮󠁧󠁿', '🇩🇪'],
    madi: ['🇨🇦'],
    nick: ['🇳🇿'],

    phoebe: ['🇸🇬'],
    sunil: ['🇨🇦'],
    suraj: ['🇲🇾'],
  };
  function nationalityFlags(name){
    const flags = NATIONALITY_FLAGS[String(name||'').trim().toLowerCase()];

    return `<span class="flag-cell">${flags.join(' ')}</span>`;
  }

  function playerPhoto(player){
    if(!player) return null;
    if(player.photo) return player.photo;
    return avatarUrl(player.name);

  // Real illustrated caricature artwork (background removed), keyed by lowercase name.
  function playerFigure(player){
    if(!player) return null;

    return FIGURES[key] || null;

  // Reads a File, downsizes it to a square headshot, returns a compact base64 data URL.
  function photoFileToDataUrl(file, maxSize){
    maxSize = maxSize || 160;
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onerror = () => reject(reader.error);
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error('Could not read that image'));
        img.onload = () => {
          const side = Math.min(img.width, img.height);
          const sx = (img.width - side) / 2, sy = (img.height - side) / 2;
          const canvas = document.createElement('canvas');
          canvas.width = maxSize; canvas.height = maxSize;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, sx, sy, side, side, 0, 0, maxSize, maxSize);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function fetchCollection(collection){
    for(let attempt=0; attempt<2; attempt++){
      try{
        const resp = await fetch(`/api/data?collection=${encodeURIComponent(collection)}`);
        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        return { items: (data && Array.isArray(data.items)) ? data.items : [], ok:true };
      }catch(e){
        if(attempt===1) return { items: [], ok:false };
      }
    }
  }
  async function saveItem(collection, item){
    for(let attempt=0; attempt<2; attempt++){
      try{
        const resp = await fetch('/api/data', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({collection, id:item.id, value:item})
        });
        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if(!data || !data.ok) throw new Error('bad response');
        return true;
      }catch(e){
        if(attempt===1){ showToast('Save failed after retrying — check your connection and try again'); return false; }
      }
    }
  }
  async function deleteItem(collection, id){
    for(let attempt=0; attempt<2; attempt++){
      try{
        const resp = await fetch('/api/data', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({collection, id, deleted:true})
        });
        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if(!data || !data.ok) throw new Error('bad response');
        return true;
      }catch(e){
        if(attempt===1){ showToast('Delete failed after retrying — check your connection and try again'); return false; }
      }
    }
  }

  // Adds an item to local state immediately (so the UI feels instant), but
  // rolls that back if the actual save fails — so a failed save can never
  // silently look like a success that then disappears on refresh.
  async function addAndSave(collection, item){
    STATE[collection].push(item);
    const ok = await saveItem(collection, item);
    if(!ok){
      STATE[collection] = STATE[collection].filter(x=>x.id!==item.id);
    }
    return ok;
  }

  // ---------- AI HELPERS (scorecard photo reading + course lookup) ----------
  async function callClaudeAPI(payload){

  function extractText(data){
    if(!data || !data.content) return '';

  }
  function extractJSON(text){
    if(!text) return null;
    let cleaned = text.replace(/```json/gi,'').replace(/```/g,'').trim();
    const match = cleaned.match(/[\{\[][\s\S]*[\}\]]/);
    if(match) cleaned = match[0];
    try{ return JSON.parse(cleaned); }catch(e){ return null; }
  }
  function fileToBase64(file){
    return new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=> res(r.result.split(',')[1]);
      r.onerror = ()=> rej(new Error('Could not read file'));
      r.readAsDataURL(file);
    });
  }

  // ---------- HANDICAP MATH (simplified WHS) ----------
  const REVEAL_TABLE = [
    null,
    {n:1,use:1,adj:-2},{n:2,use:1,adj:-1},{n:3,use:1,adj:0},{n:4,use:2,adj:-1},
    {n:5,use:1,adj:0},{n:6,use:2,adj:-1},{n:7,use:2,adj:0},{n:8,use:2,adj:0},
    {n:9,use:3,adj:0},{n:10,use:3,adj:0},{n:11,use:3,adj:0},{n:12,use:4,adj:0},
    {n:13,use:4,adj:0},{n:14,use:4,adj:0},{n:15,use:5,adj:0},{n:16,use:5,adj:0},
    {n:17,use:6,adj:0},{n:18,use:6,adj:0},{n:19,use:7,adj:0}
  ];
  function diffFor(n){
    if(n===0) return {use:8,adj:0};
    if(n>=20) return {use:8,adj:0};
    return REVEAL_TABLE[n] || {use:8,adj:0};
  }
  function computeDifferential(gross, rating, slope){
    return Math.round(((113/(slope||113))*(gross-rating))*10)/10;
  }
  // Sanity bound for a gross score, scaled to how many holes were played.
  // Mirrors the manual round form's min/max so scorecard photo reads and
  // bulk pastes can't sneak in a misparsed number as if it were a full round.
  function isPlausibleGross(g, holes){
    if(typeof g !== 'number' || isNaN(g)) return false;
    if(holes === 9) return g >= 20 && g <= 90;
    return g >= 50 && g <= 150; // 18-hole (default)
  }
  // Rounds without a stored `holes` value predate 9-hole support and were
  // always full 18-hole rounds, so they default to 18 here.
  function is18HoleRound(r){ return (r.holes || 18) === 18; }
  function computeHandicapIndex(playerId){
    const rs = STATE.rounds.filter(r=>r.playerId===playerId && is18HoleRound(r))
      .sort((a,b)=> new Date(b.date)-new Date(a.date))
      .slice(0,20);
    if(rs.length===0) return null;
    const diffs = rs.map(r=>r.differential).sort((a,b)=>a-b);
    const cfg = diffFor(diffs.length);
    const use = Math.min(cfg.use, diffs.length);
    const best = diffs.slice(0,use);
    const avg = best.reduce((a,b)=>a+b,0)/best.length;
    const idx = Math.round((avg*0.96 + cfg.adj)*10)/10;
    return idx;
  }

  function playerName(id){ const p = STATE.players.find(p=>p.id===id); return p?p.name:'—'; }
  function courseName(id){ const c = STATE.courses.find(c=>c.id===id); return c?c.name:'—'; }
  function courseById(id){ return STATE.courses.find(c=>c.id===id); }

  // ---------- HOLE-BY-HOLE: pars, birdies, eagles ----------
  function parseNumberList(raw, expectedLen){
    if(raw===undefined || raw===null) return null;
    const str = String(raw).trim();
    if(!str) return null;
    const parts = str.split(',').map(s=>s.trim());
    if(parts.length !== expectedLen) return null;
    // Preserve position: a blank or unparseable slot becomes null (that
    // single hole is simply skipped later) rather than invalidating the
    // whole 18-hole array over one unclear entry.
    return parts.map(s=>{
      if(s==='') return null;
      const n = parseFloat(s);
      return isNaN(n) ? null : n;
    });
  }
  // Same idea as parseNumberList, but for per-hole lists specifically:
  // accepts either a 9-hole or an 18-hole card rather than forcing a
  // fixed length, so a genuine 9-hole scorecard can be entered/imported
  // as what it actually is instead of being padded or rejected.
  function parseHoleList(raw){
    if(raw===undefined || raw===null) return null;
    const str = String(raw).trim();
    if(!str) return null;
    const parts = str.split(',').map(s=>s.trim());
    if(parts.length !== 9 && parts.length !== 18) return null;
    return parts.map(s=>{
      if(s==='') return null;
      const n = parseFloat(s);
      return isNaN(n) ? null : n;
    });
  }
  // Works out how many holes a round covers. Prefers something actually
  // recognized (a scorecard's transcribed hole count, or a hole-by-hole
  // list of exactly 9 or 18 entries) over guessing. Only falls back to the
  // scoring heuristic — under 70 strokes is essentially always a 9-hole
  // round, not a freakishly good 18 — when nothing more concrete is known.
  function inferHoles(gross, recognizedHoleCount){
    if(recognizedHoleCount === 9 || recognizedHoleCount === 18) return recognizedHoleCount;
    return (typeof gross === 'number' && !isNaN(gross) && gross < 70) ? 9 : 18;
  }
  // Definitions, exact and non-negotiable:
  //   Par    = hole score − hole par === 0
  //   Birdie = hole score − hole par === -1
  //   Eagle  = hole score − hole par <= -2  (covers albatross/condor too)
  //   Bogey  = +1, Double-or-worse = +2 or more
  function classifyHole(score, par){
    const diff = score - par;
    if(diff <= -2) return 'eagle';
    if(diff === -1) return 'birdie';
    if(diff === 0) return 'par';
    if(diff === 1) return 'bogey';
    return 'doublePlus';
  }
  function computeHoleStats(round, course){
    if(!round.holeScores || !course || !course.holePars) return null;
    const stats = {eagle:0, birdie:0, par:0, bogey:0, doublePlus:0};
    round.holeScores.forEach((s,i)=>{
      const par = course.holePars[i];
      if(par===undefined || par===null || s===undefined || s===null) return;
      const c = classifyHole(s, par);
      stats[c]++;
    });
    return stats;
  }
  // Same exact-match classification, applied directly to a freshly-read
  // scorecard photo (raw per-hole score array vs raw per-hole par array)
  // rather than to a saved round. Only holes where BOTH the score and the
  // par were transcribed with confidence are counted — nothing here is
  // guessed or inferred from markings, only calculated from the numbers.
  function computeConfirmedCounts(holeScores, holePars){
    const counts = {eagle:0, birdie:0, par:0, bogey:0, doublePlus:0, confirmedHoles:0};
    if(!Array.isArray(holeScores) || !Array.isArray(holePars)) return counts;
    const len = Math.max(holeScores.length, holePars.length);
    for(let i=0; i<len; i++){
      const s = holeScores[i], p = holePars[i];
      if(s===null || s===undefined || p===null || p===undefined) continue;
      counts[classifyHole(s,p)]++;
      counts.confirmedHoles++;
    }
    return counts;
  }
  // Best statistical performer at a given course: lowest average NET score
  // (gross minus that player's current handicap index) across their rounds
  // there. Using net rather than gross means it measures who plays best at
  // this course relative to their own ability, not just who's lowest-handicap
  // overall. Requires at least 2 rounds at the course to count as meaningful.
  function courseChampion(courseId){
    const byPlayer = {};
    STATE.rounds.filter(r=>r.courseId===courseId && is18HoleRound(r)).forEach(r=>{
      (byPlayer[r.playerId] = byPlayer[r.playerId]||[]).push(r);
    });
    let best = null;
    Object.keys(byPlayer).forEach(playerId=>{
      const rounds = byPlayer[playerId];
      if(rounds.length < 2) return;
      const idx = computeHandicapIndex(playerId);
      if(idx===null) return;
      const avgNet = rounds.reduce((sum,r)=> sum + (r.gross - idx), 0) / rounds.length;
      if(!best || avgNet < best.avgNet){
        best = {playerId, avgNet: Math.round(avgNet*10)/10, rounds: rounds.length};
      }
    });
    return best;
  }
  function playerHoleTally(playerId){
    const totals = {eagle:0, birdie:0, par:0, bogey:0, doublePlus:0, roundsWithData:0};
    STATE.rounds.filter(r=>r.playerId===playerId).forEach(r=>{
      const stats = r.holeScores ? computeHoleStats(r, courseById(r.courseId)) : null;
      if(stats){
        totals.eagle+=stats.eagle; totals.birdie+=stats.birdie; totals.par+=stats.par;
        totals.bogey+=stats.bogey; totals.doublePlus+=stats.doublePlus; totals.roundsWithData++;
      } else {
        const me = r.manualEagles||0, mb = r.manualBirdies||0, mp = r.manualPars||0;
        if(me || mb || mp){
          totals.eagle+=me; totals.birdie+=mb; totals.par+=mp; totals.roundsWithData++;
        }
      }
    });
    return totals;
  }
  // Course a player has logged the most rounds at (ties broken by whichever
  // course was reached first in round order).
  function favouriteCourse(playerId){
    const rounds = STATE.rounds.filter(r=>r.playerId===playerId);
    if(!rounds.length) return null;
    const counts = {};
    rounds.forEach(r=>{ counts[r.courseId] = (counts[r.courseId]||0)+1; });
    let bestId = null, bestCount = 0;
    Object.keys(counts).forEach(id=>{
      if(counts[id] > bestCount){ bestCount = counts[id]; bestId = id; }
    });
    return bestId ? {name: courseName(bestId), count: bestCount} : null;
  }

  // ---------- LEADERBOARD ----------
  function buildLeaderboard(){
    const raw = STATE.players.map(p=>{
      const rounds = STATE.rounds.filter(r=>r.playerId===p.id);
      const rounds18 = rounds.filter(is18HoleRound);
      const idx = computeHandicapIndex(p.id);
      let bestNet = null;
      let scoreVsHcpTotal = 0;
      if(rounds18.length && idx!==null){
        bestNet = Math.min(...rounds18.map(r=>Math.round(r.gross - idx)));
        rounds18.forEach(r=>{
          const course = courseById(r.courseId);
          if(course) scoreVsHcpTotal += Math.round(course.par - (r.gross - idx));
        });
      }
      const tally = playerHoleTally(p.id);
      const parsBirdiesTotal = tally.eagle*8 + tally.birdie*5 + tally.par*2;

      // Averaged per round played, so a player with 3 rounds isn't outranked
      // purely by someone who's logged 30 — volume doesn't buy points.
      // Score-vs-handicap only counts 18-hole rounds (the only pool a
      // handicap is computed from); null means not enough 18-hole rounds
      // yet to be ranked on this metric. Pars/birdies/eagles count every
      // round played, 9-hole included.
      const scoreVsHcpAvg = (rounds18.length && idx!==null) ? Math.round((scoreVsHcpTotal/rounds18.length)*10)/10 : null;
      const parsBirdiesAvg = rounds.length ? Math.round((parsBirdiesTotal/rounds.length)*10)/10 : 0;

      return {player:p, roundsPlayed:rounds.length, idx, bestNet, tally, scoreVsHcpAvg, parsBirdiesAvg};
    });

    // Score vs Hcp and Pars/Birdies live on completely different scales
    // (strokes-relative-to-par vs. points-per-round), so each is min-max
    // normalized to 0-100 across the current field before weighting —
    // that's what makes "75%" and "25%" a real weighting rather than raw
    // units of very different sizes. Field's current best on a metric
    // scores 100 on it, field's current worst scores 0. Players with no
    // 18-hole rounds yet score 0 on Score vs Hcp until they've established one.
    const svhVals = raw.filter(r=>r.scoreVsHcpAvg!==null).map(r=>r.scoreVsHcpAvg);
    const pbVals = raw.map(r=>r.parsBirdiesAvg);
    const svhMin = svhVals.length ? Math.min(...svhVals) : 0;
    const svhMax = svhVals.length ? Math.max(...svhVals) : 0;
    const pbMin = pbVals.length ? Math.min(...pbVals) : 0;
    const pbMax = pbVals.length ? Math.max(...pbVals) : 0;
    function normalize(val, min, max){
      if(val===null) return 0;
      if(max===min) return 100; // no spread in the field — everyone's on equal footing
      return Math.round(((val-min)/(max-min))*1000)/10;
    }

    return raw.map(r=>{
      const svhNorm = normalize(r.scoreVsHcpAvg, svhMin, svhMax);
      const pbNorm = normalize(r.parsBirdiesAvg, pbMin, pbMax);
      const performanceScore = Math.round((svhNorm*0.75 + pbNorm*0.25)*10)/10;
      return {...r, svhNorm, pbNorm, performanceScore};
    }).sort((a,b)=> b.performanceScore-a.performanceScore || (a.idx===null?999:a.idx)-(b.idx===null?999:b.idx));
  }

  function render(){
    const app = document.getElementById('app');
    app.innerHTML = `
      <header class="hero">
        <h1 class="title">The Birdie Shack</h1>

  function renderLeaderboard(){
    const rows = buildLeaderboard();
    if(STATE.players.length===0){
      return `<div class="empty"><strong>No golfers yet</strong>Add your crew in the Players tab to start the ledger.</div>`;
    }
    const groupTally = {eagle:0,birdie:0,par:0,bogey:0,doublePlus:0};
    rows.forEach(r=>{ groupTally.eagle+=r.tally.eagle; groupTally.birdie+=r.tally.birdie; groupTally.par+=r.tally.par; groupTally.bogey+=r.tally.bogey; groupTally.doublePlus+=r.tally.doublePlus; });
    return `
      <div class="team-photo-wrap">
        <p class="team-photo-title">The Crew</p>
        <p class="team-photo-sub">Add a headshot for anyone in the Players tab and they'll show up here in character.</p>
        ${teamLineup()}
      </div>
      <div class="section-head">
        <h2>Season Leaderboard</h2>
        <span class="section-note">Performance Score = 75% Score-vs-Handicap + 25% Pars/Birdies/Eagles (each normalized 0–100 across the group). See legend below.</span>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>#</th><th>Player</th><th>HCP</th><th>Rounds</th><th>Score vs Hcp (avg)</th><th>Pars/Birdies (avg)</th><th>Performance Score</th></tr></thead>
          <tbody>
            ${rows.map((r,i)=>`
              <tr>
                <td class="rank ${i===0?'rank-1':''}">${i+1}</td>
                <td class="name-cell">${avatarImg(r.player.name)}${nationalityFlags(r.player.name)}${r.player.name}${i===0 && r.performanceScore>0 ? ' <span class="pill">Top of the ledger</span>':''}</td>
                <td class="mono">${r.idx===null?'NH':r.idx.toFixed(1)}</td>
                <td class="mono">${r.roundsPlayed}</td>
                <td class="mono">${r.scoreVsHcpAvg===null?'—':(r.scoreVsHcpAvg>0?'+':'')+r.scoreVsHcpAvg}</td>
                <td class="mono">${r.parsBirdiesAvg}</td>
                <td class="mono">${r.performanceScore}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <p class="legend">
          <strong>Score vs Hcp</strong>: average of (course par − net score) across your 18-hole rounds. Positive means playing better than your handicap predicts. Needs at least one 18-hole round with a handicap index to be ranked here — shown as "—" until then.<br>
          <strong>Pars/Birdies</strong>: average points per round from (8×eagles + 5×birdies + 2×pars), every round played including 9-holers. Defined per hole as: par = score equals hole par, birdie = score is exactly 1 under hole par, eagle = score is 2 or more under hole par. Calculated automatically by comparing hole-by-hole scores to hole-by-hole pars (never guessed from markings or color coding) — or entered manually on a simple score entry.<br>
          <strong>Performance Score</strong>: both metrics above are converted to a 0–100 scale relative to the current group (the field's best on that metric scores 100, the field's worst scores 0), then combined 75% Score vs Hcp + 25% Pars/Birdies. This keeps the weighting meaningful regardless of the raw units, and every round counts equally — logging more rounds doesn't buy extra points on its own.<br>
          NH = not enough rounds yet for a handicap index.
        </p>
      </div>
      <div class="section-head" style="margin-top:22px;"><h2>Pars &amp; Birdies Tally</h2></div>
      <div class="card">
        <table>
          <thead><tr><th>Player</th><th>Eagles</th><th>Birdies</th><th>Pars</th><th>Bogeys</th><th>Double+</th><th>Rounds w/ hole data</th></tr></thead>
          <tbody>
            ${rows.map(r=>`
              <tr>
                <td class="name-cell">${avatarImg(r.player.name)}${nationalityFlags(r.player.name)}${r.player.name}</td>
                <td class="mono">${r.tally.eagle}</td>
                <td class="mono">${r.tally.birdie}</td>
                <td class="mono">${r.tally.par}</td>
                <td class="mono">${r.tally.bogey}</td>
                <td class="mono">${r.tally.doublePlus}</td>
                <td class="mono">${r.tally.roundsWithData}</td>
              </tr>
            `).join('')}
            <tr>
              <td class="name-cell">Group total</td>
              <td class="mono">${groupTally.eagle}</td>
              <td class="mono">${groupTally.birdie}</td>
              <td class="mono">${groupTally.par}</td>
              <td class="mono">${groupTally.bogey}</td>
              <td class="mono">${groupTally.doublePlus}</td>
              <td class="mono">—</td>
            </tr>
          </tbody>
        </table>
        <p class="legend">Only rounds with hole-by-hole scores (and a course with hole-by-hole pars) count here — a plain gross-score entry won't add to this tally.</p>
      </div>
    `;
  }

  function renderRounds(){
    const playerOpts = STATE.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    const courseOpts = STATE.courses.map(c=>`<option value="${c.id}">${c.name} (par ${c.par})</option>`).join('');
    const disabled = (STATE.players.length===0 || STATE.courses.length===0);
    const rounds = [...STATE.rounds].sort((a,b)=> new Date(b.date)-new Date(a.date));
    return `
      <div class="section-head">
        <h2>Log a Round</h2>
        <span class="section-note">Add players and courses first if the dropdowns are empty.</span>
      </div>
      <div class="card">
        <form id="round-form">
          <div class="form-grid">
            <div><label>Player</label><select name="playerId" required ${disabled?'disabled':''}>${playerOpts||'<option value="">Add a player first</option>'}</select></div>
            <div><label>Course</label><select name="courseId" required ${disabled?'disabled':''}>${courseOpts||'<option value="">Add a course first</option>'}</select></div>
            <div><label>Date</label><input type="date" name="date" value="${new Date().toISOString().slice(0,10)}" required></div>
            <div><label>Holes played</label><select name="holes" id="round-holes-select"><option value="18" selected>18 holes</option><option value="9">9 holes</option></select></div>
            <div><label>Gross score</label><input type="number" name="gross" id="round-gross" min="20" max="150" placeholder="e.g. 88" required></div>
          </div>
          <p class="section-note" style="margin:-6px 0 14px;">9-hole rounds count toward rounds played and pars/birdies, but are left out of handicap and best-score calculations, which need a full 18-hole card.</p>
          <label>Hole-by-hole scores (optional — 9 or 18 numbers, comma-separated)</label>
          <input type="text" name="holeScores" id="round-holescores" placeholder="6,5,5,4,5,5,5,4,6,4,5,6,2,5,4,4,6,7">
          <p class="section-note" style="margin:-6px 0 14px;">Adding these (and hole pars on the course) feeds the Pars &amp; Birdies tally automatically, and — if it's a clean 9 or 18 entries — sets Holes played for you above. If you're just entering a total score, use the counts below instead.</p>
          <label>Eagles / Birdies / Pars this round (optional, default 0 — only used if hole-by-hole scores above are left blank)</label>
          <div class="form-grid">
            <div><label style="text-transform:none;font-size:10px;">Eagles</label><input type="number" name="manualEagles" min="0" value="0"></div>
            <div><label style="text-transform:none;font-size:10px;">Birdies</label><input type="number" name="manualBirdies" min="0" value="0"></div>
            <div><label style="text-transform:none;font-size:10px;">Pars</label><input type="number" name="manualPars" min="0" value="0"></div>
          </div>
          <label>Head-to-head opponent (optional)</label>
          <select name="opponentId"><option value="">— None, just a simple score —</option>${playerOpts}</select>
          <div class="form-grid">
            <div><label>Opponent's gross score</label><input type="number" name="opponentGross" min="20" max="150" placeholder="only if opponent selected above"></div>
            <div><label>Stakes (optional)</label><input type="text" name="stakes" placeholder="e.g. Loser buys the first round"></div>
          </div>
          <p class="section-note" style="margin:-6px 0 14px;">Leave the opponent blank for a simple score entry — no head-to-head points without an opponent logged here or in the Head-to-Head tab.</p>
          <button class="btn" type="submit" ${disabled?'disabled':''}>Log round</button>
        </form>
      </div>
      <div class="section-head" style="margin-top:22px;"><h2>Recent Rounds</h2></div>
      ${rounds.length===0 ? `<div class="empty"><strong>No rounds logged</strong>Log one above, or bring in history via the Import tab.</div>` : `
      <div class="card">
        <table>
          <thead><tr><th>Date</th><th>Player</th><th>Course</th><th>Holes</th><th>Gross</th><th>Diff.</th><th>Card</th><th></th><th></th></tr></thead>
          <tbody>
            ${rounds.map(r=>{
              const c = courseById(r.courseId);
              const toPar = c ? r.gross - c.par : null;
              const holesN = r.holes || 18;
              return `<tr>
                <td class="mono">${r.date}</td>
                <td>${avatarImg(playerName(r.playerId))}${playerName(r.playerId)}</td>
                <td>${r.courseName || courseName(r.courseId)}</td>
                <td class="mono">${holesN}${holesN===9?' <span class="pill">9-hole</span>':''}</td>
                <td class="mono">${r.gross}${toPar!==null?` <span class="pill ${toPar>0?'over':(toPar<0?'under':'')}">${toPar>0?'+':''}${toPar}</span>`:''}</td>
                <td class="mono">${is18HoleRound(r) ? r.differential : '—'}</td>
                <td class="mono">${r.holeScores?'✓':'—'}</td>
                <td><button class="btn ghost small" data-editround="${r.id}">Edit</button></td>
                <td><button class="btn ghost small" data-delround="${r.id}">Remove</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}
    `;
  }

  function renderH2H(){
    const playerOpts = STATE.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    const disabled = STATE.players.length < 2;
    const matches = [...STATE.matches].sort((a,b)=> new Date(b.date)-new Date(a.date));
    return `
      <div class="section-head">
        <h2>Log a Match</h2>
        <span class="section-note">Bragging rights, side bets, or a proper match-play card — log the result here.</span>
      </div>
      <div class="card">
        <form id="match-form">
          <div class="form-grid">
            <div><label>Player A</label><select name="a" required ${disabled?'disabled':''}>${playerOpts}</select></div>
            <div><label>Player B</label><select name="b" required ${disabled?'disabled':''}>${playerOpts}</select></div>
            <div><label>Format</label><select name="format"><option>Stroke play</option><option>Match play</option><option>Skins</option><option>Nassau</option></select></div>
            <div><label>Date</label><input type="date" name="date" value="${new Date().toISOString().slice(0,10)}" required></div>
          </div>
          <label>Winner</label>

  // ---------- GENERIC MODAL ----------
  function openModal(html){
    const root = document.getElementById('modal-root');
    if(!root) return;
    root.innerHTML = html;
    const overlay = document.getElementById('app-modal-overlay');
    if(overlay){
      overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    }
    const closeBtn = document.getElementById('app-modal-close');
    if(closeBtn) closeBtn.addEventListener('click', closeModal);
    document.addEventListener('keydown', escCloseModal);
  }

  function closeModal(){
    const root = document.getElementById('modal-root');
    if(root) root.innerHTML = '';
    document.removeEventListener('keydown', escCloseModal);
  }

  function escCloseModal(e){
    if(e.key === 'Escape') closeModal();
  }

  function openEditRoundModal(roundId){
    openModal(renderEditRoundModal(roundId));
    const form = document.getElementById('edit-round-form');
    if(!form) return;
    // If the score is changed to correct a bad entry, suggest the matching
    // hole count too (under 70 = 9 holes) — but never fight a manual pick.
    const holesSelect = form.querySelector('#edit-holes-select');
    const grossInput = form.querySelector('#edit-gross');
    let holesTouchedByUser = false;
    if(holesSelect){
      holesSelect.addEventListener('change', ()=>{ holesTouchedByUser = true; });
      if(grossInput) grossInput.addEventListener('input', ()=>{
        if(holesTouchedByUser) return;
        holesSelect.value = String(inferHoles(parseFloat(grossInput.value), null));
      });
    }
    form.addEventListener('submit', async e=>{
      e.preventDefault();
      const r = STATE.rounds.find(r=>r.id===roundId);
      if(!r) return;
      const fd = new FormData(form);
      const courseId = fd.get('courseId');
      const c = courseById(courseId);
      const holes = parseInt(fd.get('holes')) === 9 ? 9 : 18;
      const gross = parseFloat(fd.get('gross'));
      const date = fd.get('date');
      if(!isPlausibleGross(gross, holes)){
        showToast(holes===9 ? 'Gross score should be a 9-hole total (20–90)' : 'Gross score should be a full 18-hole total (50–150)');
        return;
      }
      const prev = {courseId:r.courseId, courseName:r.courseName, date:r.date, holes:r.holes, gross:r.gross, differential:r.differential};
      r.courseId = courseId;
      r.courseName = c ? c.name : r.courseName;
      r.date = date;
      r.holes = holes;
      r.gross = gross;
      r.differential = c ? computeDifferential(gross, c.rating, c.slope) : r.differential;
      const ok = await saveItem(COLLECTIONS.rounds, r);
      if(!ok){ Object.assign(r, prev); render(); return; }
      showToast('Round updated');
      closeModal();
      render();
    });
  }

                <div style="display:flex;gap:4px;">
                  <input type="number" class="sc-peagles" min="0" value="${p.eagles||0}" style="margin-bottom:0;width:48px;" title="Eagles (score 2+ under hole par)">
                  <input type="number" class="sc-pbirdies" min="0" value="${p.birdies||0}" style="margin-bottom:0;width:48px;" title="Birdies (score 1 under hole par)">
                  <input type="number" class="sc-ppars" min="0" value="${p.pars||0}" style="margin-bottom:0;width:48px;" title="Pars (score equals hole par)">
                </div>
                <p class="section-note" style="margin:2px 0 0;">${p.confirmedHoles ? `Calculated from ${p.confirmedHoles}/${recognizedHoles||initialHoles} holes with both score and par read clearly.` : 'Not calculated — hole pars or scores weren\'t both legible. Enter counts manually if you know them.'}</p>
              </td>
              <td>
                <select class="sc-passign" style="margin-bottom:0;">
                  <option value="">— New player —</option>
                  ${STATE.players.map(rp=>`<option value="${rp.id}" ${(rp.name && p.name && rp.name.toLowerCase()===p.name.toLowerCase())?'selected':''}>${rp.name}</option>`).join('')}
                </select>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <button class="btn sc-confirm" style="margin-top:12px;">Save these rounds</button>
    `;
    box.appendChild(wrapper);

    wrapper.querySelector('.sc-confirm').addEventListener('click', async ()=>{
      const courseName = wrapper.querySelector('.sc-course').value.trim();
      if(!courseName){ showToast('Course name is required'); return; }
      const date = wrapper.querySelector('.sc-date').value;
      const par = parseFloat(wrapper.querySelector('.sc-par').value)||72;
      const rating = parseFloat(wrapper.querySelector('.sc-rating').value)||72;
      const slope = parseFloat(wrapper.querySelector('.sc-slope').value)||113;
      const holePars = parseHoleList(wrapper.querySelector('.sc-holepars').value);
      const holes = wrapper.querySelector('.sc-holes').value === '9' ? 9 : 18;
      let course = STATE.courses.find(c=>c.name.toLowerCase()===courseName.toLowerCase());
      let courseOk;
      if(!course){
        course = {id:uid(), name:courseName, par, rating, slope, holePars};
        courseOk = await addAndSave(COLLECTIONS.courses, course);
      } else {
        const prev = {par:course.par, rating:course.rating, slope:course.slope, holePars:course.holePars};
        course.par=par; course.rating=rating; course.slope=slope; if(holePars) course.holePars=holePars;
        courseOk = await saveItem(COLLECTIONS.courses, course);
        if(!courseOk) Object.assign(course, prev);
      }
      if(!courseOk){ showToast('Course failed to save — nothing else was saved either'); render(); return; }
      const rows = wrapper.querySelectorAll('tbody tr');
      let count = 0, failed = 0;
      for(const row of rows){
        const name = row.querySelector('.sc-pname').value.trim();
        const scoreVal = row.querySelector('.sc-pscore').value;
        const holesRaw = row.querySelector('.sc-pholes').value;
        const assign = row.querySelector('.sc-passign').value;
        if(!name || !scoreVal) continue;
        let playerId = assign;
        if(!playerId){
          const newP = {id:uid(), name};
          const playerOk = await addAndSave(COLLECTIONS.players, newP);
          if(!playerOk){ failed++; continue; }
          playerId = newP.id;
        }
        const gross = parseFloat(scoreVal);
        const holeScores = parseHoleList(holesRaw);
        // A row's own hole-by-hole list (if it's a clean 9 or 18) is the
        // most concrete signal for that player — falls back to whatever
        // was selected/detected for the card as a whole otherwise.
        const rowHoles = (holeScores && (holeScores.length===9 || holeScores.length===18)) ? holeScores.length : holes;
        if(!isPlausibleGross(gross, rowHoles)){
          showToast(`Skipped ${name} — "${scoreVal}" doesn't look like a ${rowHoles}-hole score (${rowHoles===9?'20–90':'50–150'})`);
          failed++;
          continue;
        }
        const manualEagles = parseInt(row.querySelector('.sc-peagles').value)||0;
        const manualBirdies = parseInt(row.querySelector('.sc-pbirdies').value)||0;
        const manualPars = parseInt(row.querySelector('.sc-ppars').value)||0;
        const differential = computeDifferential(gross, course.rating, course.slope);
        const newRound = {id:uid(), playerId, courseId:course.id, courseName:course.name, date, gross, holes:rowHoles, differential, holeScores, manualEagles, manualBirdies, manualPars};
        const ok = await addAndSave(COLLECTIONS.rounds, newRound);
        if(ok) count++; else failed++;
      }
      showToast(`Saved ${count} round${count===1?'':'s'} from the scorecard${failed?`, ${failed} failed`:''}`);
      wrapper.remove();
      if(!box.children.length){ ACTIVE_TAB = 'rounds'; render(); }
    });
  }

  // ---------- EVENT BINDING ----------
  function bindTabEvents(){
    const main = document.getElementById('main');

    const roundForm = main.querySelector('#round-form');
    if(roundForm){
      // Auto-detects Holes played from what's typed: a clean 9- or 18-entry
      // hole-by-hole list wins outright; otherwise the under-70 scoring
      // heuristic kicks in once a gross score is entered. Manually changing
      // the dropdown afterwards is always respected — this only fills in a
      // sensible default, it doesn't fight the user.
      const holesSelect = roundForm.querySelector('#round-holes-select');
      const grossInput = roundForm.querySelector('#round-gross');
      const holeScoresInput = roundForm.querySelector('#round-holescores');
      let holesTouchedByUser = false;
      if(holesSelect){
        holesSelect.addEventListener('change', ()=>{ holesTouchedByUser = true; });
        const autoDetect = ()=>{
          if(holesTouchedByUser) return;
          const list = parseHoleList(holeScoresInput.value);
          const recognized = (list && (list.length===9 || list.length===18)) ? list.length : null;
          const gross = parseFloat(grossInput.value);
          holesSelect.value = String(inferHoles(gross, recognized));
        };
        if(grossInput) grossInput.addEventListener('input', autoDetect);
        if(holeScoresInput) holeScoresInput.addEventListener('input', autoDetect);
      }
    }
    if(roundForm) roundForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(roundForm);
      const courseId = fd.get('courseId');
      const c = courseById(courseId);
      const gross = parseFloat(fd.get('gross'));
      const holes = parseInt(fd.get('holes')) === 9 ? 9 : 18;
      if(!isPlausibleGross(gross, holes)){
        showToast(holes===9 ? 'Gross score should be a 9-hole total (20–90)' : 'Gross score should be a full 18-hole total (50–150)');
        return;
      }
      const opponentId = fd.get('opponentId');
      const opponentGrossVal = fd.get('opponentGross');
      if(opponentId && !opponentGrossVal){
        showToast("Add the opponent's score, or clear the opponent for a simple entry");
        return;
      }
      if(opponentId && !isPlausibleGross(parseFloat(opponentGrossVal), holes)){
        showToast(holes===9 ? "Opponent's score should be a 9-hole total (20–90)" : "Opponent's score should be a full 18-hole total (50–150)");
        return;
      }
      const playerId = fd.get('playerId');
      const date = fd.get('date');
      const differential = computeDifferential(gross, c.rating, c.slope);
      const holeScores = parseHoleList(fd.get('holeScores'));
      const manualEagles = parseInt(fd.get('manualEagles'))||0;
      const manualBirdies = parseInt(fd.get('manualBirdies'))||0;
      const manualPars = parseInt(fd.get('manualPars'))||0;
      const newRound = {id:uid(), playerId, courseId, courseName:c.name, date, gross, holes, differential, holeScores, manualEagles, manualBirdies, manualPars};
      const roundOk = await addAndSave(COLLECTIONS.rounds, newRound);
      if(!roundOk){ render(); return; }

      if(opponentId){
        const oGross = parseFloat(opponentGrossVal);
        const oDiff = computeDifferential(oGross, c.rating, c.slope);
        const opponentRound = {id:uid(), playerId:opponentId, courseId, courseName:c.name, date, gross:oGross, holes, differential:oDiff, holeScores:null, manualEagles:0, manualBirdies:0, manualPars:0};
        const opponentOk = await addAndSave(COLLECTIONS.rounds, opponentRound);
        if(!opponentOk){ showToast('Your round saved, but the opponent round failed — no match was logged'); render(); return; }
        const idxA = computeHandicapIndex(playerId);
        const idxB = computeHandicapIndex(opponentId);
        const netA = gross - (idxA||0);
        const netB = oGross - (idxB||0);
        const winnerId = netA<netB ? playerId : (netB<netA ? opponentId : null);
        const newMatch = {id:uid(), players:[playerId, opponentId], format:'Stroke play (from round)', date, winnerId, stakes:fd.get('stakes')||''};
        const matchOk = await addAndSave(COLLECTIONS.matches, newMatch);
        if(!matchOk){ showToast('Both rounds saved, but the match record failed to save'); render(); return; }
      }
      showToast(opponentId ? 'Round + head-to-head logged' : 'Round logged');
      render();
    });

    main.querySelectorAll('[data-editround]').forEach(b=> b.addEventListener('click', ()=>{
      openEditRoundModal(b.dataset.editround);
    }));

    main.querySelectorAll('[data-editcourse]').forEach(b=> b.addEventListener('click', ()=>{
      openEditCourseModal(b.dataset.editcourse);
    }));

    main.querySelectorAll('[data-delround]').forEach(b=> b.addEventListener('click', async ()=>{
      const id = b.dataset.delround;
      STATE.rounds = STATE.rounds.filter(r=>r.id!==id);
      await deleteItem(COLLECTIONS.rounds, id);
      render();
    }));

    const matchForm = main.querySelector('#match-form');
    if(matchForm) matchForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(matchForm);
      const a = fd.get('a'), b = fd.get('b');
      if(a===b){ showToast('Pick two different players'); return; }
      const newMatch = {id:uid(), players:[a,b], format:fd.get('format'), date:fd.get('date'), winnerId:fd.get('winnerId')||null, stakes:fd.get('stakes')};
      const ok = await addAndSave(COLLECTIONS.matches, newMatch);
      if(ok) showToast('Match logged');
      render();
    });

    main.querySelectorAll('[data-delmatch]').forEach(b=> b.addEventListener('click', async ()=>{
      const id = b.dataset.delmatch;
      STATE.matches = STATE.matches.filter(m=>m.id!==id);
      await deleteItem(COLLECTIONS.matches, id);
      render();
    }));

    const courseForm = main.querySelector('#course-form');
    if(courseForm) courseForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(courseForm);
      const holePars = parseHoleList(fd.get('holePars'));
      const newCourse = {id:uid(), name:fd.get('name'), par:parseFloat(fd.get('par')), rating:parseFloat(fd.get('rating')), slope:parseFloat(fd.get('slope')), holePars};
      const ok = await addAndSave(COLLECTIONS.courses, newCourse);
      if(ok) showToast('Course added');
      render();
    });

    main.querySelectorAll('[data-delcourse]').forEach(b=> b.addEventListener('click', async ()=>{
      const id = b.dataset.delcourse;
      STATE.courses = STATE.courses.filter(c=>c.id!==id);
      await deleteItem(COLLECTIONS.courses, id);
      render();
    }));

    const playerForm = main.querySelector('#player-form');
    if(playerForm) playerForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(playerForm);
      const name = fd.get('name').trim();
      if(!name) return;
      const newPlayer = {id:uid(), name};
      const ok = await addAndSave(COLLECTIONS.players, newPlayer);
      if(ok) showToast('Golfer added');
      render();
    });

    main.querySelectorAll('[data-delplayer]').forEach(b=> b.addEventListener('click', async ()=>{
      const id = b.dataset.delplayer;
      STATE.players = STATE.players.filter(p=>p.id!==id);
      await deleteItem(COLLECTIONS.players, id);
      render();
    }));

    main.querySelectorAll('[data-viewstats]').forEach(b=> b.addEventListener('click', ()=>{
      openPlayerStatsModal(b.dataset.viewstats);
    }));

    const bulkAddBtn = main.querySelector('#bulk-add-players-btn');
    if(bulkAddBtn) bulkAddBtn.addEventListener('click', async ()=>{
      const raw = main.querySelector('#bulk-player-input').value;
      const names = raw.split(/[\n,]/).map(s=>s.trim()).filter(Boolean);
      if(!names.length) return;
      let added = 0, skipped = 0, failed = 0;
      for(const name of names){
        const exists = STATE.players.find(p=>p.name.toLowerCase()===name.toLowerCase());
        if(exists){ skipped++; continue; }
        const newPlayer = {id:uid(), name};
        const ok = await addAndSave(COLLECTIONS.players, newPlayer);
        if(ok) added++; else failed++;
      }
      showToast(`Added ${added} golfer${added===1?'':'s'}${skipped?`, skipped ${skipped} already on the roster`:''}${failed?`, ${failed} failed to save`:''}`);
      render();
    });

    const migrateBtn = main.querySelector('#migrate-btn');
    if(migrateBtn) migrateBtn.addEventListener('click', async ()=>{
      const statusEl = main.querySelector('#migrate-status');
      migrateBtn.disabled = true;
      statusEl.innerHTML = `<p class="section-note">Checking for data saved under the old format…</p>`;
      const legacyMap = { players:'golf:players', courses:'golf:courses', rounds:'golf:rounds', matches:'golf:matches' };
      let found = 0, migrated = 0, skipped = 0;
      try{
        for(const [collection, legacyKey] of Object.entries(legacyMap)){
          const resp = await fetch(`/api/data?legacyKey=${encodeURIComponent(legacyKey)}`);
          if(!resp.ok) continue;
          const data = await resp.json();
          const arr = data && data.value;
          if(!Array.isArray(arr) || !arr.length) continue;
          found += arr.length;
          const existingIds = new Set(STATE[collection].map(x=>x.id));
          for(const item of arr){
            if(!item || !item.id) continue;
            if(existingIds.has(item.id)){ skipped++; continue; }
            const ok = await saveItem(collection, item);
            if(ok) migrated++;
          }
        }
      }catch(e){
        statusEl.innerHTML = `<div class="banner warn">Something went wrong checking: ${e.message}</div>`;
        migrateBtn.disabled = false;
        return;
      }
      migrateBtn.disabled = false;
      if(found===0){
        statusEl.innerHTML = `<div class="banner">No old-format data found — nothing to recover. If you're still missing something, it may be worth checking the Blobs tab in your Netlify dashboard directly.</div>`;
      } else {
        showToast(`Restored ${migrated} record${migrated===1?'':'s'} from before the update`);
        await loadAll();
      }
    });

    const importForm = main.querySelector('#import-form');
    if(importForm) importForm.addEventListener('submit', e=>{
      e.preventDefault();
      const fd = new FormData(importForm);
      const playerId = fd.get('playerId');
      const raw = fd.get('raw').trim();
      if(!raw || !playerId){ showToast('Pick a player and paste some rows'); return; }
      const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
      const parsed = lines.map(line=>{
        const delim = line.includes('\t') ? '\t' : ',';
        const cols = line.split(delim).map(s=>s.trim());
        const [date, course, tees, score, rating, slope, par, eagles, birdies, pars, holes] = cols;
        const scoreNum = parseFloat(score);
        const explicitHoles = (parseInt(holes)===9 || parseInt(holes)===18) ? parseInt(holes) : null;
        return {
          date: date, course: course, tees: tees||'', score: scoreNum,
          rating: rating?parseFloat(rating):72.0, slope: slope?parseFloat(slope):113, par: par?parseFloat(par):72,
          eagles: eagles?parseInt(eagles):0, birdies: birdies?parseInt(birdies):0, pars: pars?parseInt(pars):0,
          holes: inferHoles(scoreNum, explicitHoles)
        };
      }).filter(r=> r.course && !isNaN(r.score));

      const implausible = parsed.filter(r=> !isPlausibleGross(r.score, r.holes));
      const valid = parsed.filter(r=> isPlausibleGross(r.score, r.holes));

      const preview = document.getElementById('import-preview');
      if(valid.length===0){
        preview.innerHTML = `<div class="banner warn">Couldn't parse any rows with a plausible score for their hole count — check the format and try again.</div>`;
        return;
      }
      preview.innerHTML = `
        ${implausible.length ? `<div class="banner warn">Skipped ${implausible.length} row${implausible.length===1?'':'s'} with an unlikely score for the stated hole count — check those lines against the source and re-paste separately if they're genuine.</div>` : ''}
        <div class="banner">Found ${valid.length} round${valid.length===1?'':'s'} for ${playerName(playerId)}. Review, then confirm.</div>
        <table><thead><tr><th>Date</th><th>Course</th><th>Tees</th><th>Holes</th><th>Score</th><th>Rating</th><th>Slope</th><th>E/B/P</th></tr></thead>
        <tbody>${valid.map(p=>`<tr><td class="mono">${p.date}</td><td>${p.course}</td><td>${p.tees}</td><td class="mono">${p.holes}</td><td class="mono">${p.score}</td><td class="mono">${p.rating}</td><td class="mono">${p.slope}</td><td class="mono">${p.eagles}/${p.birdies}/${p.pars}</td></tr>`).join('')}</tbody></table>
        <button class="btn" id="confirm-import" style="margin-top:12px;">Confirm import</button>
      `;
      document.getElementById('confirm-import').addEventListener('click', async ()=>{
        let imported = 0, failed = 0;
        for(const row of valid){
          let c = STATE.courses.find(c=>c.name.toLowerCase()===row.course.toLowerCase());
          if(!c){
            c = {id:uid(), name:row.course, par:row.par, rating:row.rating, slope:row.slope};
            const courseOk = await addAndSave(COLLECTIONS.courses, c);
            if(!courseOk){ failed++; continue; }
          }
          const differential = computeDifferential(row.score, c.rating, c.slope);
          const newRound = {id:uid(), playerId, courseId:c.id, courseName:c.name, date:row.date, gross:row.score, holes:row.holes, differential,
            manualEagles:row.eagles, manualBirdies:row.birdies, manualPars:row.pars};
          const ok = await addAndSave(COLLECTIONS.rounds, newRound);
          if(ok) imported++; else failed++;
        }
        showToast(`Imported ${imported} round${imported===1?'':'s'}${failed?`, ${failed} failed to save`:''}`);
        ACTIVE_TAB = 'rounds';
        render();
      });
    });

    // Scorecard photo extraction
    const photoInput = main.querySelector('#scorecard-photo');
    const extractBtn = main.querySelector('#extract-scorecard-btn');
    if(photoInput){
      photoInput.addEventListener('change', ()=>{ extractBtn.disabled = !photoInput.files.length; });
    }
    if(extractBtn) extractBtn.addEventListener('click', async ()=>{
      const files = Array.from(photoInput.files || []);
      if(!files.length) return;
      const statusEl = main.querySelector('#scorecard-status');
      extractBtn.disabled = true;
      let succeeded = 0, failed = 0;
      for(let i=0; i<files.length; i++){
        const file = files[i];
        statusEl.innerHTML = `<p class="section-note">Reading photo ${i+1} of ${files.length}${files.length>1?` (${file.name})`:''}…</p>`;
        try{
          const mediaType = file.type || 'image/jpeg';
          const base64 = await fileToBase64(file);
          const prompt = `You are transcribing a photo of a golf scorecard (could be a paper card or a screenshot from an app like TheGrint). Your only job is accurate transcription of what's printed — not judgment or interpretation. Respond with ONLY valid JSON, no markdown fences, no commentary, in exactly this shape:
{
  "courseName": string or null,
  "teeName": string or null,
  "date": string in YYYY-MM-DD format or null,
  "par": number or null,
  "rating": number or null,
  "slope": number or null,
  "holes": 9 or 18 — count the hole columns actually printed on the card (a front-9 or back-9-only card is 9; a full card is 18) — this must be exactly one of those two numbers,
  "holePars": array with exactly as many entries as "holes" above (numbers, or null for any single hole whose printed par you can't read with certainty) — this is the PAR row, one value per hole, not a total,
  "players": [ { "name": string or null, "totalScore": number or null, "holeScores": array with exactly as many entries as "holes" above (numbers, or null for any single hole whose printed score you can't read with certainty) — one value per hole, not a total } ]
}
Rules: transcribe only the digits actually printed for each hole — never estimate, infer, or fill in a value you're not confident of; use null for that single hole instead. Ignore any circles, boxes, colors, dots, or other decorative markings on the card entirely — they are not a reliable signal and must not influence what you transcribe. If a total score isn't printed but every hole score for that player is legible, you may sum them. List every player column on the card.`;
          const data = await callClaudeAPI({
            model:"claude-sonnet-4-6", max_tokens:1000,
            messages:[{role:"user", content:[
              {type:"image", source:{type:"base64", media_type:mediaType, data:base64}},
              {type:"text", text:prompt}
            ]}]
          });
          if(data.error){ failed++; continue; }
          const parsed = extractJSON(extractText(data));
          if(!parsed){ failed++; continue; }
          // Trust the recognized hole count only if it's exactly 9 or 18;
          // anything else (missing, malformed) is left unset so the rest
          // of the flow falls back to detecting it from the data itself.
          parsed.holes = (parsed.holes===9 || parsed.holes===18) ? parsed.holes : null;
          // Classification happens here, in code, from the transcribed
          // per-hole numbers only — never from the model's own opinion.
          if(Array.isArray(parsed.players)){
            parsed.players.forEach(p=>{
              const counts = computeConfirmedCounts(p.holeScores, parsed.holePars);
              p.eagles = counts.eagle;
              p.birdies = counts.birdie;
              p.pars = counts.par;
              p.confirmedHoles = counts.confirmedHoles;
            });
          }
          renderScorecardPreview(parsed, files.length>1 ? `From: ${file.name}` : null);
          succeeded++;
        }catch(e){
          failed++;
        }
      }
      extractBtn.disabled = false;
      photoInput.value = '';
      if(succeeded && !failed){
        statusEl.innerHTML = `<p class="section-note">Read ${succeeded} scorecard${succeeded===1?'':'s'} — review each below before saving.</p>`;
      } else if(succeeded && failed){
        statusEl.innerHTML = `<div class="banner warn">Read ${succeeded} scorecard${succeeded===1?'':'s'}, but couldn't make out ${failed} of them — try clearer or straighter shots for those.</div>`;
      } else {
        statusEl.innerHTML = `<div class="banner warn">Couldn't make out a scorecard in ${failed>1?'any of those photos':'that photo'} — try clearer or straighter shots.</div>`;
      }
    });

    // Course auto-lookup
    const lookupBtn = main.querySelector('#course-lookup-btn');
    if(lookupBtn) lookupBtn.addEventListener('click', async ()=>{
      const input = main.querySelector('#course-lookup-input');
      const names = input.value.split('\n').map(s=>s.trim()).filter(Boolean);
      if(!names.length) return;
      const statusEl = main.querySelector('#course-lookup-status');
      const previewEl = main.querySelector('#course-lookup-preview');
      previewEl.innerHTML = '';
      lookupBtn.disabled = true;
      const results = [];
      for(const name of names){
        statusEl.innerHTML = `<p class="section-note">Looking up ${name}…</p>`;
        const prompt = `Find the official golf course rating, slope rating, and par for the golf course named "${name}". Prefer the men's standard/white tees if multiple tees exist. Respond with ONLY valid JSON, no markdown fences, no commentary, in exactly this shape:
{"name": "${name.replace(/"/g,'\\"')}", "tee": string or null, "par": number or null, "rating": number or null, "slope": number or null, "confidence": "high" or "medium" or "low"}
If you can't find reliable data, set par/rating/slope to null and confidence to "low".`;
        const data = await callClaudeAPI({
          model:"claude-sonnet-4-6", max_tokens:1000,
          messages:[{role:"user", content:prompt}],
          tools:[{type:"web_search_20250305", name:"web_search"}]
        });
        if(data.error){ results.push({name, error:data.error}); continue; }
        const parsed = extractJSON(extractText(data));
        results.push(parsed || {name, par:null, rating:null, slope:null, confidence:'low'});
      }
      statusEl.innerHTML = '';
      lookupBtn.disabled = false;
      renderCourseLookupPreview(results);
    });
  }

  loadAll();
})();
</script>
</body>
</html>
