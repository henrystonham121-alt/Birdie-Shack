<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Birdie Shack — Golf Society Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --fairway:#1B4332;
    --fairway-deep:#122B21;
    --turf:#40916C;
    --turf-light:#74C69D;
    --cream:#F6F1E4;
    --paper:#FCFAF3;
    --sand:#C9A876;
    --sand-line:#D9C6A0;
    --flag:#A8412F;
    --ink:#26261F;
    --ink-soft:#5C5A4E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:960px;margin:0 auto;padding:0 0 64px;}

  /* HEADER */
  header.hero{
    background:linear-gradient(160deg,var(--fairway) 0%,var(--fairway-deep) 100%);
    color:var(--paper);
    padding:36px 24px 28px;
    border-bottom:6px solid var(--sand);
    position:relative;
    overflow:hidden;
  }
  header.hero::after{
    content:"";
    position:absolute;right:-40px;top:-40px;width:200px;height:200px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06), transparent 70%);
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--turf-light);margin:0 0 8px;
  }
  h1.title{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:clamp(32px,7vw,52px);
    line-height:.95;
    margin:0 0 6px;
    letter-spacing:-.01em;
  }
  .subtitle{
    font-size:14px;color:rgba(246,241,228,.72);max-width:520px;line-height:1.5;
  }

  /* NAV */
  nav.tabs{
    display:flex;gap:2px;overflow-x:auto;
    background:var(--fairway-deep);
    padding:0 24px;
    -ms-overflow-style:none;scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{
    flex:0 0 auto;
    background:none;border:none;
    color:rgba(246,241,228,.55);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    padding:14px 16px;cursor:pointer;
    border-bottom:3px solid transparent;
    transition:color .15s, border-color .15s;
    white-space:nowrap;
  }
  nav.tabs button:hover{color:rgba(246,241,228,.85);}
  nav.tabs button.active{color:var(--paper);border-bottom-color:var(--sand);}

  main{padding:28px 24px 0;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .section-head h2{
    font-family:'Fraunces',serif;font-weight:700;font-size:24px;margin:0;
  }
  .section-note{font-size:12.5px;color:var(--ink-soft);max-width:480px;}

  .card{
    background:var(--paper);
    border:1px solid var(--sand-line);
    border-radius:10px;
    padding:18px 20px;
    margin-bottom:16px;
  }
  .btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;letter-spacing:.04em;text-transform:uppercase;
    background:var(--fairway);color:var(--paper);
    border:none;border-radius:6px;
    padding:10px 16px;cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--fairway-deep);}
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:transparent;color:var(--fairway);border:1.5px solid var(--fairway);}
  .btn.ghost:hover{background:var(--fairway);color:var(--paper);}
  .btn.flag{background:var(--flag);}
  .btn.flag:hover{background:#832F21;}
  .btn.small{padding:6px 10px;font-size:11px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  label{display:block;font-size:11px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:4px;}
  input,select,textarea{
    width:100%;padding:9px 10px;border:1.5px solid var(--sand-line);border-radius:6px;
    background:var(--cream);font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);
    margin-bottom:12px;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--turf);outline-offset:1px;border-color:var(--turf);}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0 14px;}
  textarea{min-height:120px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;resize:vertical;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{
    text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--ink-soft);border-bottom:2px solid var(--sand);padding:8px 8px;
  }
  td{padding:10px 8px;border-bottom:1px solid var(--sand-line);}
  tr:last-child td{border-bottom:none;}
  .rank{font-family:'Fraunces',serif;font-weight:700;font-size:16px;color:var(--fairway);}
  .rank-1{color:var(--flag);}
  .name-cell{font-weight:600;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .pill{
    display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
    padding:2px 7px;border-radius:20px;background:var(--turf);color:var(--paper);
  }
  .pill.over{background:var(--flag);}
  .pill.under{background:var(--fairway);}
  .empty{
    text-align:center;padding:36px 20px;color:var(--ink-soft);font-size:13.5px;
    border:1.5px dashed var(--sand-line);border-radius:10px;
  }
  .empty strong{display:block;font-family:'Fraunces',serif;font-size:18px;color:var(--ink);margin-bottom:4px;font-weight:600;}
  .row-actions{display:flex;gap:6px;}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:6px;}
  .inline-form > div{flex:1;min-width:120px;}
  .banner{
    background:rgba(64,145,108,.12);border:1px solid var(--turf);border-radius:8px;
    padding:10px 14px;font-size:12.5px;color:var(--fairway-deep);margin-bottom:14px;
  }
  .warn{background:rgba(168,65,47,.1);border-color:var(--flag);color:#7A2E1F;}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:8px;
    font-size:13px;font-family:'IBM Plex Mono',monospace;opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:50;
  }
  .toast.show{opacity:1;}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .badge{
    font-size:11px;background:var(--sand);color:var(--fairway-deep);padding:3px 9px;border-radius:20px;
    font-family:'IBM Plex Mono',monospace;
  }
  .legend{font-size:11.5px;color:var(--ink-soft);margin-top:10px;line-height:1.6;}
  .loading{padding:60px 24px;text-align:center;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:13px;}
  .avatar{
    width:26px;height:26px;border-radius:50%;object-fit:cover;
    vertical-align:middle;margin-right:8px;border:1.5px solid var(--sand);
    background:var(--cream);display:inline-block;
  }
  .avatar-lg{width:44px;height:44px;margin-right:12px;border-width:2px;}
  .avatar-fallback{
    display:inline-flex;align-items:center;justify-content:center;
    background:var(--turf);color:var(--paper);font-family:'IBM Plex Mono',monospace;
    font-weight:600;font-size:12px;
  }
  .avatar-lg.avatar-fallback{font-size:18px;}
  @media(max-width:520px){
    table{font-size:12px;}
    th,td{padding:8px 5px;}
  }
</style>
</head>

</div>

  const COLLECTIONS = { players:'players', courses:'courses', rounds:'rounds', matches:'matches' };
  let STATE = { players:[], courses:[], rounds:[], matches:[], loaded:false };
  let ACTIVE_TAB = 'leaderboard';

  function avatarUrl(name){
    if(!name) return null;
    const key = Object.keys(AVATARS).find(k=>k.toLowerCase()===String(name).trim().toLowerCase());
    return key ? AVATARS[key] : null;
  }
  function avatarImg(name, size){
    const url = avatarUrl(name);
    const cls = size==='lg' ? 'avatar avatar-lg' : 'avatar';
    if(url) return `<img class="${cls}" src="${url}" alt="">`;
    const initial = (name||'?').trim().charAt(0).toUpperCase();
    return `<span class="${cls} avatar-fallback">${initial}</span>`;
  }

  const TABS = [
    {id:'leaderboard', label:'Leaderboard'},
    {id:'rounds', label:'Rounds'},
    {id:'h2h', label:'Head-to-Head'},
    {id:'courses', label:'Courses'},
    {id:'players', label:'Players'},
    {id:'import', label:'Import'},
  ];

  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }

  async function fetchCollection(collection){
    try{
      const resp = await fetch(`/api/data?collection=${encodeURIComponent(collection)}`);
      if(!resp.ok) return [];
      const data = await resp.json();
      return (data && Array.isArray(data.items)) ? data.items : [];
    }catch(e){ return []; }
  }
  async function saveItem(collection, item){
    try{
      const resp = await fetch('/api/data', {

  function extractJSON(text){
    if(!text) return null;
    let cleaned = text.replace(/```json/gi,'').replace(/```/g,'').trim();
    const match = cleaned.match(/[\{\[][\s\S]*[\}\]]/);
    if(match) cleaned = match[0];
    try{ return JSON.parse(cleaned); }catch(e){ return null; }

  function fileToBase64(file){
    return new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=> res(r.result.split(',')[1]);
      r.onerror = ()=> rej(new Error('Could not read file'));
      r.readAsDataURL(file);
    });
  }

  // ---------- HANDICAP MATH (simplified WHS) ----------
  const REVEAL_TABLE = [
    null,
    {n:1,use:1,adj:-2},{n:2,use:1,adj:-1},{n:3,use:1,adj:0},{n:4,use:2,adj:-1},
    {n:5,use:1,adj:0},{n:6,use:2,adj:-1},{n:7,use:2,adj:0},{n:8,use:2,adj:0},
    {n:9,use:3,adj:0},{n:10,use:3,adj:0},{n:11,use:3,adj:0},{n:12,use:4,adj:0},
    {n:13,use:4,adj:0},{n:14,use:4,adj:0},{n:15,use:5,adj:0},{n:16,use:5,adj:0},
    {n:17,use:6,adj:0},{n:18,use:6,adj:0},{n:19,use:7,adj:0}
  ];
  function diffFor(n){
    if(n===0) return {use:8,adj:0};
    if(n>=20) return {use:8,adj:0};
    return REVEAL_TABLE[n] || {use:8,adj:0};
  }
  function computeDifferential(gross, rating, slope){
    return Math.round(((113/(slope||113))*(gross-rating))*10)/10;
  }
  function computeHandicapIndex(playerId){
    const rs = STATE.rounds.filter(r=>r.playerId===playerId)
      .sort((a,b)=> new Date(b.date)-new Date(a.date))
      .slice(0,20);
    if(rs.length===0) return null;
    const diffs = rs.map(r=>r.differential).sort((a,b)=>a-b);
    const cfg = diffFor(diffs.length);
    const use = Math.min(cfg.use, diffs.length);
    const best = diffs.slice(0,use);
    const avg = best.reduce((a,b)=>a+b,0)/best.length;
    const idx = Math.round((avg*0.96 + cfg.adj)*10)/10;
    return idx;
  }

  function playerName(id){ const p = STATE.players.find(p=>p.id===id); return p?p.name:'—'; }
  function courseName(id){ const c = STATE.courses.find(c=>c.id===id); return c?c.name:'—'; }
  function courseById(id){ return STATE.courses.find(c=>c.id===id); }

  // ---------- HOLE-BY-HOLE: pars, birdies, eagles ----------
  function parseNumberList(raw, expectedLen){
    if(!raw) return null;
    const parts = String(raw).split(',').map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n));
    return parts.length===expectedLen ? parts : null;
  }
  function classifyHole(score, par){
    const diff = score - par;
    if(diff <= -2) return 'eagle';
    if(diff === -1) return 'birdie';
    if(diff === 0) return 'par';
    if(diff === 1) return 'bogey';
    return 'doublePlus';
  }
  function computeHoleStats(round, course){
    if(!round.holeScores || !course || !course.holePars) return null;
    const stats = {eagle:0, birdie:0, par:0, bogey:0, doublePlus:0};
    round.holeScores.forEach((s,i)=>{
      const par = course.holePars[i];
      if(par===undefined || par===null || s===undefined || s===null) return;
      const c = classifyHole(s, par);
      stats[c]++;
    });
    return stats;
  }
  function playerHoleTally(playerId){
    const totals = {eagle:0, birdie:0, par:0, bogey:0, doublePlus:0, roundsWithData:0};
    STATE.rounds.filter(r=>r.playerId===playerId).forEach(r=>{
      if(r.holeScores){
        const stats = computeHoleStats(r, courseById(r.courseId));
        if(stats){
          totals.eagle+=stats.eagle; totals.birdie+=stats.birdie; totals.par+=stats.par;
          totals.bogey+=stats.bogey; totals.doublePlus+=stats.doublePlus; totals.roundsWithData++;
        }
      } else {
        const me = r.manualEagles||0, mb = r.manualBirdies||0, mp = r.manualPars||0;
        if(me || mb || mp){
          totals.eagle+=me; totals.birdie+=mb; totals.par+=mp; totals.roundsWithData++;
        }
      }
    });
    return totals;
  }

  // ---------- LEADERBOARD ----------
  function buildLeaderboard(){
    return STATE.players.map(p=>{
      const rounds = STATE.rounds.filter(r=>r.playerId===p.id);
      const idx = computeHandicapIndex(p.id);
      const matches = STATE.matches.filter(m=>m.players.includes(p.id));
      const wins = matches.filter(m=>m.winnerId===p.id).length;
      const losses = matches.filter(m=>m.winnerId && m.winnerId!==p.id).length;
      const halvedCount = matches.filter(m=>!m.winnerId).length;
      let bestNet = null;
      let scoreVsHcpTotal = 0;
      if(rounds.length && idx!==null){
        bestNet = Math.min(...rounds.map(r=>Math.round(r.gross - idx)));
        rounds.forEach(r=>{
          const course = courseById(r.courseId);
          if(course) scoreVsHcpTotal += Math.round(course.par - (r.gross - idx));
        });
      }
      const tally = playerHoleTally(p.id);
      const parsBirdiesTotal = tally.eagle*8 + tally.birdie*5 + tally.par*2;
      const totalMatches = wins+losses+halvedCount;

      // Averaged per round/match played, so a player with 3 rounds isn't
      // outranked purely by someone who's logged 30 — volume doesn't buy points.
      const scoreVsHcpAvg = rounds.length ? Math.round((scoreVsHcpTotal/rounds.length)*10)/10 : 0;
      const parsBirdiesAvg = rounds.length ? Math.round((parsBirdiesTotal/rounds.length)*10)/10 : 0;
      const h2hAvg = totalMatches ? Math.round(((wins*3 + halvedCount*1)/totalMatches)*10)/10 : 0;
      const performanceScore = Math.round((scoreVsHcpAvg + parsBirdiesAvg + h2hAvg)*10)/10;

      return {player:p, roundsPlayed:rounds.length, idx, wins, losses, halved:halvedCount, bestNet, tally,
        scoreVsHcpAvg, parsBirdiesAvg, h2hAvg, performanceScore};
    }).sort((a,b)=> b.performanceScore-a.performanceScore || (a.idx===null?999:a.idx)-(b.idx===null?999:b.idx));
  }

              <td><input type="number" class="cl-par" value="${r.par||72}" style="margin-bottom:0;width:70px;"></td>
              <td><input type="number" step="0.1" class="cl-rating" value="${r.rating||''}" style="margin-bottom:0;width:80px;"></td>
              <td><input type="number" class="cl-slope" value="${r.slope||''}" style="margin-bottom:0;width:80px;"></td>
              <td class="mono">${r.confidence||(r.error?'error':'—')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <p class="legend">Confidence reflects how sure Claude was based on what it found searching — check any "low" or blank rows against the course's own scorecard before trusting the handicap math.</p>
      <button class="btn" id="cl-confirm" style="margin-top:12px;">Add these courses</button>
    `;
    document.getElementById('cl-confirm').addEventListener('click', async ()=>{
      const rows = box.querySelectorAll('tbody tr');
      let count = 0;
      for(const row of rows){
        const name = row.querySelector('.cl-name').value.trim();
        if(!name) continue;
        const par = parseFloat(row.querySelector('.cl-par').value)||72;
        const ratingVal = row.querySelector('.cl-rating').value;
        const slopeVal = row.querySelector('.cl-slope').value;
        const rating = ratingVal ? parseFloat(ratingVal) : par;
        const slope = slopeVal ? parseFloat(slopeVal) : 113;
        const existing = STATE.courses.find(c=>c.name.toLowerCase()===name.toLowerCase());
        let course;
        if(existing){ existing.par=par; existing.rating=rating; existing.slope=slope; course=existing; }
        else{ course = {id:uid(), name, par, rating, slope}; STATE.courses.push(course); }
        await saveItem(COLLECTIONS.courses, course);
        count++;
      }
      showToast(`Added/updated ${count} course${count===1?'':'s'}`);
      ACTIVE_TAB = 'courses';
      render();
    });
  }

  function renderPlayers(){
    const players = STATE.players;
    return `
      <div class="section-head"><h2>The Roster</h2></div>
      <div class="card">
        <form id="player-form" class="inline-form">
          <div><label>Name</label><input type="text" name="name" placeholder="e.g. Nikesh" required></div>
          <button class="btn" type="submit">Add golfer</button>
        </form>
      </div>
      ${players.length===0? `<div class="empty"><strong>No golfers yet</strong>Add your crew above.</div>` : `
      <div class="card"><table>
        <thead><tr><th>Name</th><th>HCP Index</th><th>Rounds</th><th></th></tr></thead>
        <tbody>${players.map(p=>{
          const idx = computeHandicapIndex(p.id);
          const n = STATE.rounds.filter(r=>r.playerId===p.id).length;
          return `<tr><td class="name-cell">${avatarImg(p.name,'lg')}${p.name}</td><td class="mono">${idx===null?'NH':idx.toFixed(1)}</td><td class="mono">${n}</td>
          <td><button class="btn ghost small" data-delplayer="${p.id}">Remove</button></td></tr>`;
        }).join('')}</tbody>
      </table></div>`}
    `;
  }

  function renderImport(){
    const playerOpts = STATE.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    const disabled = STATE.players.length===0;
    return `
      <div class="section-head"><h2>Import from TheGrint</h2></div>
      <div class="banner">TheGrint doesn't offer a personal data export or public API — the closest thing is their own copy/paste import tool, which expects <strong>Date, Course, Tees, Score</strong> per row. Paste that same layout below and it'll drop straight into this player's rounds. Add optional Rating/Slope/Par columns if you're logging a course for the first time — otherwise it defaults to par 72 / rating 72.0 / slope 113, which will slightly skew handicap accuracy until you correct it. You can also tack on Eagles/Birdies/Pars as three more trailing columns if you know those counts — they feed the Pars &amp; Birdies tally the same way manual entry does.</div>
      <div class="card">
        <form id="import-form">
          <label>Which player is this scoring history for?</label>
          <select name="playerId" ${disabled?'disabled':''}>${playerOpts||'<option value="">Add a player first</option>'}</select>
          <label>Paste rows — tab or comma separated: Date, Course, Tees, Score, [Rating, Slope, Par, Eagles, Birdies, Pars]</label>
          <textarea name="raw" placeholder="2026-06-01, Alpine Golf Club, White, 89, 71.5, 128, 72, 0, 2, 9
2026-06-15, Alpine Golf Club, White, 85"></textarea>
          <button class="btn" type="submit" ${disabled?'disabled':''}>Preview import</button>
        </form>
        <div id="import-preview"></div>
      </div>
      <div class="section-head" style="margin-top:22px;"><h2>Import from Scorecard Photos</h2></div>
      <div class="banner">Snap or upload photos of scorecards — a TheGrint screenshot or a paper card both work, and you can select several at once. Claude reads each one and hands you an editable preview per card before anything's saved.</div>
      <div class="card">
        <label>Photos (select multiple if you've got a batch)</label>
        <input type="file" accept="image/*" id="scorecard-photo" multiple>
        <button class="btn" id="extract-scorecard-btn" disabled>Extract scores</button>
        <div id="scorecard-status"></div>
        <div id="scorecard-preview"></div>
      </div>
    `;
  }

  function renderScorecardPreview(parsed, sourceLabel){
    const box = document.getElementById('scorecard-preview');
    const players = (parsed.players && parsed.players.length) ? parsed.players : [{name:null, totalScore:null, holeScores:null}];
    const needsAttention = (parsed.rating===null || parsed.rating===undefined || parsed.slope===null || parsed.slope===undefined);
    const wrapper = document.createElement('div');
    wrapper.className = 'card';
    wrapper.style.marginTop = '12px';
    wrapper.innerHTML = `
      ${sourceLabel ? `<p class="section-note" style="margin-top:0;">${sourceLabel}</p>` : ''}
      <div class="form-grid">
        <div><label>Course</label><input type="text" class="sc-course" value="${parsed.courseName||''}"></div>
        <div><label>Tee</label><input type="text" class="sc-tee" value="${parsed.teeName||''}"></div>
        <div><label>Date</label><input type="date" class="sc-date" value="${parsed.date||new Date().toISOString().slice(0,10)}"></div>
        <div><label>Par</label><input type="number" class="sc-par" value="${parsed.par||72}"></div>
        <div><label>Rating</label><input type="number" step="0.1" class="sc-rating" value="${parsed.rating||72.0}"></div>
        <div><label>Slope</label><input type="number" class="sc-slope" value="${parsed.slope||113}"></div>
      </div>
      <label>Hole-by-hole pars (optional, 18 comma-separated)</label>
      <input type="text" class="sc-holepars" value="${(parsed.holePars||[]).join(',')}" placeholder="5,4,3,4,4,4,5,3,4,4,4,5,3,5,4,3,4,4">
      <p class="section-note" style="margin-bottom:10px;">${needsAttention ? "Rating/slope weren't legible on the card — defaults are filled in, correct them for accurate handicaps." : "Double-check these against the card before saving."}</p>
      <table>
        <thead><tr><th>Detected name</th><th>Score</th><th>Hole scores (optional)</th><th>E/B/P if no hole scores</th><th>Assign to</th></tr></thead>
        <tbody>
          ${players.map(p=>`
            <tr>
              <td><input type="text" class="sc-pname" value="${p.name||''}" style="margin-bottom:0;"></td>
              <td><input type="number" class="sc-pscore" value="${p.totalScore||''}" style="margin-bottom:0;width:80px;"></td>
              <td><input type="text" class="sc-pholes" value="${(p.holeScores||[]).join(',')}" style="margin-bottom:0;min-width:160px;" placeholder="18 comma-separated"></td>
              <td style="display:flex;gap:4px;">
                <input type="number" class="sc-peagles" min="0" value="0" style="margin-bottom:0;width:48px;" title="Eagles">
                <input type="number" class="sc-pbirdies" min="0" value="0" style="margin-bottom:0;width:48px;" title="Birdies">
                <input type="number" class="sc-ppars" min="0" value="0" style="margin-bottom:0;width:48px;" title="Pars">
              </td>
              <td>
                <select class="sc-passign" style="margin-bottom:0;">
                  <option value="">— New player —</option>
                  ${STATE.players.map(rp=>`<option value="${rp.id}" ${(rp.name && p.name && rp.name.toLowerCase()===p.name.toLowerCase())?'selected':''}>${rp.name}</option>`).join('')}
                </select>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <button class="btn sc-confirm" style="margin-top:12px;">Save these rounds</button>
    `;
    box.appendChild(wrapper);

    wrapper.querySelector('.sc-confirm').addEventListener('click', async ()=>{
      const courseName = wrapper.querySelector('.sc-course').value.trim();
      if(!courseName){ showToast('Course name is required'); return; }
      const date = wrapper.querySelector('.sc-date').value;
      const par = parseFloat(wrapper.querySelector('.sc-par').value)||72;
      const rating = parseFloat(wrapper.querySelector('.sc-rating').value)||72;
      const slope = parseFloat(wrapper.querySelector('.sc-slope').value)||113;
      const holePars = parseNumberList(wrapper.querySelector('.sc-holepars').value, 18);
      let course = STATE.courses.find(c=>c.name.toLowerCase()===courseName.toLowerCase());
      if(!course){ course = {id:uid(), name:courseName, par, rating, slope, holePars}; STATE.courses.push(course); }
      else { course.par=par; course.rating=rating; course.slope=slope; if(holePars) course.holePars=holePars; }
      await saveItem(COLLECTIONS.courses, course);
      const rows = wrapper.querySelectorAll('tbody tr');
      let count = 0;
      for(const row of rows){
        const name = row.querySelector('.sc-pname').value.trim();
        const scoreVal = row.querySelector('.sc-pscore').value;
        const holesRaw = row.querySelector('.sc-pholes').value;
        const assign = row.querySelector('.sc-passign').value;
        if(!name || !scoreVal) continue;
        let playerId = assign;
        if(!playerId){
          const newP = {id:uid(), name};
          STATE.players.push(newP);
          await saveItem(COLLECTIONS.players, newP);
          playerId = newP.id;
        }
        const gross = parseFloat(scoreVal);
        const holeScores = parseNumberList(holesRaw, 18);
        const manualEagles = parseInt(row.querySelector('.sc-peagles').value)||0;
        const manualBirdies = parseInt(row.querySelector('.sc-pbirdies').value)||0;
        const manualPars = parseInt(row.querySelector('.sc-ppars').value)||0;
        const differential = computeDifferential(gross, course.rating, course.slope);
        const newRound = {id:uid(), playerId, courseId:course.id, courseName:course.name, date, gross, differential, holeScores, manualEagles, manualBirdies, manualPars};
        STATE.rounds.push(newRound);
        await saveItem(COLLECTIONS.rounds, newRound);
        count++;
      }
      showToast(`Saved ${count} round${count===1?'':'s'} from the scorecard`);
      wrapper.remove();
      if(!box.children.length){ ACTIVE_TAB = 'rounds'; render(); }
    });
  }

  // ---------- EVENT BINDING ----------
  function bindTabEvents(){
    const main = document.getElementById('main');

    const roundForm = main.querySelector('#round-form');
    if(roundForm) roundForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(roundForm);
      const courseId = fd.get('courseId');
      const c = courseById(courseId);
      const gross = parseFloat(fd.get('gross'));
      const opponentId = fd.get('opponentId');
      const opponentGrossVal = fd.get('opponentGross');
      if(opponentId && !opponentGrossVal){
        showToast("Add the opponent's score, or clear the opponent for a simple entry");
        return;
      }
      const playerId = fd.get('playerId');
      const date = fd.get('date');
      const differential = computeDifferential(gross, c.rating, c.slope);
      const holeScores = parseNumberList(fd.get('holeScores'), 18);
      const manualEagles = parseInt(fd.get('manualEagles'))||0;
      const manualBirdies = parseInt(fd.get('manualBirdies'))||0;
      const manualPars = parseInt(fd.get('manualPars'))||0;
      const newRound = {id:uid(), playerId, courseId, courseName:c.name, date, gross, differential, holeScores, manualEagles, manualBirdies, manualPars};
      STATE.rounds.push(newRound);
      await saveItem(COLLECTIONS.rounds, newRound);

      if(opponentId){
        const oGross = parseFloat(opponentGrossVal);
        const oDiff = computeDifferential(oGross, c.rating, c.slope);
        const opponentRound = {id:uid(), playerId:opponentId, courseId, courseName:c.name, date, gross:oGross, differential:oDiff, holeScores:null, manualEagles:0, manualBirdies:0, manualPars:0};
        STATE.rounds.push(opponentRound);
        await saveItem(COLLECTIONS.rounds, opponentRound);
        const idxA = computeHandicapIndex(playerId);
        const idxB = computeHandicapIndex(opponentId);
        const netA = gross - (idxA||0);
        const netB = oGross - (idxB||0);
        const winnerId = netA<netB ? playerId : (netB<netA ? opponentId : null);
        const newMatch = {id:uid(), players:[playerId, opponentId], format:'Stroke play (from round)', date, winnerId, stakes:fd.get('stakes')||''};
        STATE.matches.push(newMatch);
        await saveItem(COLLECTIONS.matches, newMatch);
      }
      showToast(opponentId ? 'Round + head-to-head logged' : 'Round logged');
      render();
    });

    main.querySelectorAll('[data-delround]').forEach(b=> b.addEventListener('click', async ()=>{
      const id = b.dataset.delround;
      STATE.rounds = STATE.rounds.filter(r=>r.id!==id);
      await deleteItem(COLLECTIONS.rounds, id);
      render();
    }));

    const matchForm = main.querySelector('#match-form');
    if(matchForm) matchForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(matchForm);
      const a = fd.get('a'), b = fd.get('b');
      if(a===b){ showToast('Pick two different players'); return; }
      const newMatch = {id:uid(), players:[a,b], format:fd.get('format'), date:fd.get('date'), winnerId:fd.get('winnerId')||null, stakes:fd.get('stakes')};
      STATE.matches.push(newMatch);
      await saveItem(COLLECTIONS.matches, newMatch);
      showToast('Match logged');
      render();
    });

    main.querySelectorAll('[data-delmatch]').forEach(b=> b.addEventListener('click', async ()=>{
      const id = b.dataset.delmatch;
      STATE.matches = STATE.matches.filter(m=>m.id!==id);
      await deleteItem(COLLECTIONS.matches, id);
      render();
    }));

    const courseForm = main.querySelector('#course-form');
    if(courseForm) courseForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(courseForm);
      const holePars = parseNumberList(fd.get('holePars'), 18);
      const newCourse = {id:uid(), name:fd.get('name'), par:parseFloat(fd.get('par')), rating:parseFloat(fd.get('rating')), slope:parseFloat(fd.get('slope')), holePars};
      STATE.courses.push(newCourse);
      await saveItem(COLLECTIONS.courses, newCourse);
      showToast('Course added');
      render();
    });

    main.querySelectorAll('[data-delcourse]').forEach(b=> b.addEventListener('click', async ()=>{
      const id = b.dataset.delcourse;
      STATE.courses = STATE.courses.filter(c=>c.id!==id);
      await deleteItem(COLLECTIONS.courses, id);
      render();
    }));

    const playerForm = main.querySelector('#player-form');
    if(playerForm) playerForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(playerForm);
      const name = fd.get('name').trim();
      if(!name) return;
      const newPlayer = {id:uid(), name};
      STATE.players.push(newPlayer);
      await saveItem(COLLECTIONS.players, newPlayer);
      showToast('Golfer added');
      render();
    });

    main.querySelectorAll('[data-delplayer]').forEach(b=> b.addEventListener('click', async ()=>{
      const id = b.dataset.delplayer;
      STATE.players = STATE.players.filter(p=>p.id!==id);
      await deleteItem(COLLECTIONS.players, id);
      render();
    }));

    const importForm = main.querySelector('#import-form');
    if(importForm) importForm.addEventListener('submit', e=>{
      e.preventDefault();
      const fd = new FormData(importForm);
      const playerId = fd.get('playerId');
      const raw = fd.get('raw').trim();
      if(!raw || !playerId){ showToast('Pick a player and paste some rows'); return; }
      const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
      const parsed = lines.map(line=>{
        const delim = line.includes('\t') ? '\t' : ',';
        const cols = line.split(delim).map(s=>s.trim());
        const [date, course, tees, score, rating, slope, par, eagles, birdies, pars] = cols;
        return {
          date: date, course: course, tees: tees||'', score: parseFloat(score),
          rating: rating?parseFloat(rating):72.0, slope: slope?parseFloat(slope):113, par: par?parseFloat(par):72,
          eagles: eagles?parseInt(eagles):0, birdies: birdies?parseInt(birdies):0, pars: pars?parseInt(pars):0
        };
      }).filter(r=> r.course && !isNaN(r.score));

      const preview = document.getElementById('import-preview');
      if(parsed.length===0){
        preview.innerHTML = `<div class="banner warn">Couldn't parse any rows — check the format and try again.</div>`;
        return;
      }
      preview.innerHTML = `
        <div class="banner">Found ${parsed.length} round${parsed.length===1?'':'s'} for ${playerName(playerId)}. Review, then confirm.</div>
        <table><thead><tr><th>Date</th><th>Course</th><th>Tees</th><th>Score</th><th>Rating</th><th>Slope</th><th>E/B/P</th></tr></thead>
        <tbody>${parsed.map(p=>`<tr><td class="mono">${p.date}</td><td>${p.course}</td><td>${p.tees}</td><td class="mono">${p.score}</td><td class="mono">${p.rating}</td><td class="mono">${p.slope}</td><td class="mono">${p.eagles}/${p.birdies}/${p.pars}</td></tr>`).join('')}</tbody></table>
        <button class="btn" id="confirm-import" style="margin-top:12px;">Confirm import</button>
      `;
      document.getElementById('confirm-import').addEventListener('click', async ()=>{
        for(const row of parsed){
          let c = STATE.courses.find(c=>c.name.toLowerCase()===row.course.toLowerCase());
          if(!c){
            c = {id:uid(), name:row.course, par:row.par, rating:row.rating, slope:row.slope};
            STATE.courses.push(c);
            await saveItem(COLLECTIONS.courses, c);
          }
          const differential = computeDifferential(row.score, c.rating, c.slope);
          const newRound = {id:uid(), playerId, courseId:c.id, courseName:c.name, date:row.date, gross:row.score, differential,
            manualEagles:row.eagles, manualBirdies:row.birdies, manualPars:row.pars};
          STATE.rounds.push(newRound);
          await saveItem(COLLECTIONS.rounds, newRound);
        }
        showToast(`Imported ${parsed.length} rounds`);
        ACTIVE_TAB = 'rounds';
        render();
      });
    });

    // Scorecard photo extraction
    const photoInput = main.querySelector('#scorecard-photo');
    const extractBtn = main.querySelector('#extract-scorecard-btn');
    if(photoInput){
      photoInput.addEventListener('change', ()=>{ extractBtn.disabled = !photoInput.files.length; });
    }
    if(extractBtn) extractBtn.addEventListener('click', async ()=>{
      const files = Array.from(photoInput.files || []);
      if(!files.length) return;
      const statusEl = main.querySelector('#scorecard-status');
      extractBtn.disabled = true;
      let succeeded = 0, failed = 0;
      for(let i=0; i<files.length; i++){
        const file = files[i];
        statusEl.innerHTML = `<p class="section-note">Reading photo ${i+1} of ${files.length}${files.length>1?` (${file.name})`:''}…</p>`;
        try{
          const mediaType = file.type || 'image/jpeg';
          const base64 = await fileToBase64(file);
          const prompt = `You are reading a photo of a golf scorecard (could be a paper card or a screenshot from an app like TheGrint). Extract what's visible and respond with ONLY valid JSON, no markdown fences, no commentary, in exactly this shape:
{
  "courseName": string or null,
  "teeName": string or null,
  "date": string in YYYY-MM-DD format or null,
  "par": number or null,
  "rating": number or null,
  "slope": number or null,
  "holePars": array of 18 numbers (the per-hole PAR row) or null if not visible,
  "players": [ { "name": string or null, "totalScore": number or null, "holeScores": array of 18 numbers (that player's per-hole scores) or null if not visible } ]
}
If a total score isn't printed but hole-by-hole scores are visible, sum them yourself. List every player column on the card. Use null for anything genuinely not visible or legible — do not guess.`;
          const data = await callClaudeAPI({
            model:"claude-sonnet-4-6", max_tokens:1000,
            messages:[{role:"user", content:[
              {type:"image", source:{type:"base64", media_type:mediaType, data:base64}},
              {type:"text", text:prompt}
            ]}]
          });
          if(data.error){ failed++; continue; }
          const parsed = extractJSON(extractText(data));
          if(!parsed){ failed++; continue; }
          renderScorecardPreview(parsed, files.length>1 ? `From: ${file.name}` : null);
          succeeded++;
        }catch(e){
          failed++;
        }
      }
      extractBtn.disabled = false;
      photoInput.value = '';
      if(succeeded && !failed){
        statusEl.innerHTML = `<p class="section-note">Read ${succeeded} scorecard${succeeded===1?'':'s'} — review each below before saving.</p>`;
      } else if(succeeded && failed){
        statusEl.innerHTML = `<div class="banner warn">Read ${succeeded} scorecard${succeeded===1?'':'s'}, but couldn't make out ${failed} of them — try clearer or straighter shots for those.</div>`;
      } else {
        statusEl.innerHTML = `<div class="banner warn">Couldn't make out a scorecard in ${failed>1?'any of those photos':'that photo'} — try clearer or straighter shots.</div>`;
      }
    });

    // Course auto-lookup
    const lookupBtn = main.querySelector('#course-lookup-btn');
    if(lookupBtn) lookupBtn.addEventListener('click', async ()=>{
      const input = main.querySelector('#course-lookup-input');
      const names = input.value.split('\n').map(s=>s.trim()).filter(Boolean);
      if(!names.length) return;
      const statusEl = main.querySelector('#course-lookup-status');
      const previewEl = main.querySelector('#course-lookup-preview');
      previewEl.innerHTML = '';
      lookupBtn.disabled = true;
      const results = [];
      for(const name of names){
        statusEl.innerHTML = `<p class="section-note">Looking up ${name}…</p>`;
        const prompt = `Find the official golf course rating, slope rating, and par for the golf course named "${name}". Prefer the men's standard/white tees if multiple tees exist. Respond with ONLY valid JSON, no markdown fences, no commentary, in exactly this shape:
{"name": "${name.replace(/"/g,'\\"')}", "tee": string or null, "par": number or null, "rating": number or null, "slope": number or null, "confidence": "high" or "medium" or "low"}
If you can't find reliable data, set par/rating/slope to null and confidence to "low".`;
        const data = await callClaudeAPI({
          model:"claude-sonnet-4-6", max_tokens:1000,
          messages:[{role:"user", content:prompt}],
          tools:[{type:"web_search_20250305", name:"web_search"}]
        });
        if(data.error){ results.push({name, error:data.error}); continue; }
        const parsed = extractJSON(extractText(data));
        results.push(parsed || {name, par:null, rating:null, slope:null, confidence:'low'});
      }
      statusEl.innerHTML = '';
      lookupBtn.disabled = false;
      renderCourseLookupPreview(results);
    });
  }

  loadAll();
})();
</script>
</body>
</html>
